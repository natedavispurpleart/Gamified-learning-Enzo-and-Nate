function buildHintMarkup() {
  if (!currentQuestionData) {
    return "<div>No hint yet. Pick a level to generate a question.</div>";
  }

  const revealAnswer = questionMisses >= 2;

  if (currentQuestionData.type === "add") {
    return `
      <div><strong>Guide:</strong> Break the sum into a start number and a small count forward.</div>
      <div><strong>Step 1:</strong> Start with ${currentQuestionData.a}.</div>
      <div><strong>Step 2:</strong> Count forward ${currentQuestionData.b} more.</div>
      <div><strong>Check:</strong> ${currentQuestionData.a} + ${currentQuestionData.b} = ?</div>
      ${revealAnswer ? `<div><strong>Worked Example:</strong> ${currentQuestionData.a} + ${currentQuestionData.b} = ${currentAnswer}</div>` : ""}
    `;
  }

  if (currentQuestionData.type === "add-missing") {
    return `
      <div><strong>Guide:</strong> Find the missing part by comparing the total and the known addend.</div>
      <div><strong>Step 1:</strong> The total is ${currentQuestionData.total}.</div>
      <div><strong>Step 2:</strong> Take away the known part: ${currentQuestionData.b}.</div>
      <div><strong>Check:</strong> ? + ${currentQuestionData.b} = ${currentQuestionData.total}</div>
      ${revealAnswer ? `<div><strong>Worked Example:</strong> ${currentQuestionData.total} - ${currentQuestionData.b} = ${currentAnswer}</div>` : ""}
    `;
  }

  if (currentQuestionData.type === "subtract") {
    return `
      <div><strong>Guide:</strong> Start with the larger number and take away step by step.</div>
      <div><strong>Step 1:</strong> Start with ${currentQuestionData.a}.</div>
      <div><strong>Step 2:</strong> Count backward ${currentQuestionData.b}.</div>
      <div><strong>Check:</strong> What is left after taking away ${currentQuestionData.b}?</div>
      ${revealAnswer ? `<div><strong>Worked Example:</strong> ${currentQuestionData.a} - ${currentQuestionData.b} = ${currentAnswer}</div>` : ""}
    `;
  }

  if (currentQuestionData.type === "subtract-missing") {
    return `
      <div><strong>Guide:</strong> Ask how much was taken away from the starting number.</div>
      <div><strong>Step 1:</strong> Start with ${currentQuestionData.a}.</div>
      <div><strong>Step 2:</strong> End at ${currentQuestionData.result}.</div>
      <div><strong>Check:</strong> ${currentQuestionData.a} - ? = ${currentQuestionData.result}</div>
      ${revealAnswer ? `<div><strong>Worked Example:</strong> ${currentQuestionData.a} - ${currentQuestionData.result} = ${currentAnswer}</div>` : ""}
    `;
  }

  if (currentQuestionData.type === "subtract-start") {
    return `
      <div><strong>Guide:</strong> Rebuild the starting number by adding back what was removed.</div>
      <div><strong>Step 1:</strong> The ending number is ${currentQuestionData.result}.</div>
      <div><strong>Step 2:</strong> Add back ${currentQuestionData.b}.</div>
      <div><strong>Check:</strong> ? - ${currentQuestionData.b} = ${currentQuestionData.result}</div>
      ${revealAnswer ? `<div><strong>Worked Example:</strong> ${currentQuestionData.result} + ${currentQuestionData.b} = ${currentAnswer}</div>` : ""}
    `;
  }

  if (currentQuestionData.type === "multiply") {
    return `
      <div><strong>Guide:</strong> Turn multiplication into repeated addition.</div>
      <div><strong>Step 1:</strong> Think of ${currentQuestionData.a} groups of ${currentQuestionData.b}.</div>
      <div><strong>Step 2:</strong> Add ${currentQuestionData.b} repeatedly: ${currentQuestionData.repeatText}</div>
      <div><strong>Check:</strong> Multiplication is repeated addition.</div>
      ${revealAnswer ? `<div><strong>Worked Example:</strong> ${currentQuestionData.repeatText} = ${currentAnswer}</div>` : ""}
    `;
  }

  if (currentQuestionData.type === "multiply-missing") {
    return `
      <div><strong>Guide:</strong> Find the missing factor that makes the product.</div>
      <div><strong>Step 1:</strong> The full product is ${currentQuestionData.product}.</div>
      <div><strong>Step 2:</strong> Divide by the known factor ${currentQuestionData.b}.</div>
      <div><strong>Check:</strong> ? x ${currentQuestionData.b} = ${currentQuestionData.product}</div>
      ${revealAnswer ? `<div><strong>Worked Example:</strong> ${currentQuestionData.product} / ${currentQuestionData.b} = ${currentAnswer}</div>` : ""}
    `;
  }

  if (currentQuestionData.type === "divide") {
    const skipCounts = Array.from({ length: currentAnswer }, (_, index) => currentQuestionData.b * (index + 1)).join(", ");
    return `
      <div><strong>Guide:</strong> Use multiplication to reverse the division.</div>
      <div><strong>Step 1:</strong> Ask: ${currentQuestionData.b} times what number makes ${currentQuestionData.a}?</div>
      <div><strong>Step 2:</strong> Try skip-counting by ${currentQuestionData.b}.</div>
      <div><strong>Check:</strong> ${currentQuestionData.b} x ? = ${currentQuestionData.a}</div>
      ${revealAnswer ? `<div><strong>Worked Example:</strong> ${skipCounts}. So ${currentQuestionData.a} / ${currentQuestionData.b} = ${currentAnswer}</div>` : ""}
    `;
  }

  if (currentQuestionData.type === "divide-missing") {
    return `
      <div><strong>Guide:</strong> The missing divisor tells how many equal groups fit.</div>
      <div><strong>Step 1:</strong> Start with ${currentQuestionData.a}.</div>
      <div><strong>Step 2:</strong> If each group becomes ${currentQuestionData.quotient}, what divisor works?</div>
      <div><strong>Check:</strong> ${currentQuestionData.a} / ? = ${currentQuestionData.quotient}</div>
      ${revealAnswer ? `<div><strong>Worked Example:</strong> ${currentQuestionData.a} / ${currentQuestionData.quotient} = ${currentAnswer}</div>` : ""}
    `;
  }

  if (currentQuestionData.type === "divide-start") {
    return `
      <div><strong>Guide:</strong> Rebuild the starting number from divisor and quotient.</div>
      <div><strong>Step 1:</strong> Multiply the quotient ${currentQuestionData.quotient} by the divisor ${currentQuestionData.b}.</div>
      <div><strong>Step 2:</strong> That gives the missing starting number.</div>
      <div><strong>Check:</strong> ? / ${currentQuestionData.b} = ${currentQuestionData.quotient}</div>
      ${revealAnswer ? `<div><strong>Worked Example:</strong> ${currentQuestionData.quotient} x ${currentQuestionData.b} = ${currentAnswer}</div>` : ""}
    `;
  }

  if (currentQuestionData.type === "grouped-order") {
    const groupedSum = currentQuestionData.a + currentQuestionData.b;
    return `
      <div><strong>Guide:</strong> Parentheses go first.</div>
      <div><strong>Step 1:</strong> Add inside the parentheses: ${currentQuestionData.a} + ${currentQuestionData.b} = ${groupedSum}</div>
      <div><strong>Step 2:</strong> Multiply ${groupedSum} by ${currentQuestionData.c}.</div>
      <div><strong>Check:</strong> Solve inside () before multiplying.</div>
      ${revealAnswer ? `<div><strong>Worked Example:</strong> (${currentQuestionData.a} + ${currentQuestionData.b}) x ${currentQuestionData.c} = ${currentAnswer}</div>` : ""}
    `;
  }

  const multiplied = currentQuestionData.a * currentQuestionData.b;
  return `
    <div><strong>Guide:</strong> Solve the multiplication part before the addition.</div>
    <div><strong>Step 1:</strong> Do multiplication first: ${currentQuestionData.a} x ${currentQuestionData.b}</div>
    <div><strong>Step 2:</strong> Then add ${currentQuestionData.c} to ${multiplied}.</div>
    <div><strong>Check:</strong> Follow order of operations, multiplication before addition.</div>
    ${revealAnswer ? `<div><strong>Worked Example:</strong> ${currentQuestionData.a} x ${currentQuestionData.b} = ${multiplied}, then ${multiplied} + ${currentQuestionData.c} = ${currentAnswer}</div>` : ""}
  `;
}

function updateHintPanel() {
  const hintPanel = document.getElementById("hintPanel");
  if (hintPanel.style.display === "none") {
    return;
  }

  hintPanel.innerHTML = buildHintMarkup();
}

function toggleHint() {
  const hintPanel = document.getElementById("hintPanel");
  const showing = hintPanel.style.display !== "none";
  hintPanel.style.display = showing ? "none" : "block";
  if (!showing) {
    hintPanel.innerHTML = buildHintMarkup();
  }
}

function renderSpellBook() {
  const grid = document.getElementById("spellGrid");
  grid.innerHTML = "";
  document.getElementById("cardsEarned").innerText = getOwnedSpellIds().length;

  getOwnedSpellIds().forEach((id) => {
    const spell = getScaledSpellStats(getSpellById(id));
    const rankClass = spell.spellLevel >= 5 ? " rank-5" : spell.spellLevel >= 3 ? " rank-3" : "";
    const button = document.createElement("button");
    button.className = "spell-button" + rankClass + (id === currentSpellId ? " selected" : "");
    button.onclick = () => selectSpell(id);
    button.innerHTML = formatSpellCard(spell);
    grid.appendChild(button);
  });

  renderPlayerStats();
  renderRelics();
  updateSelectedSpell();
}

function selectSpell(id) {
  currentSpellId = id;
  renderSpellBook();

  const spell = getScaledSpellStats(getCurrentSpell());
  if (level && level < spell.minLevel) {
    setStatus(`${spell.name} needs level ${spell.minLevel}. Choose a tougher difficulty to use it.`);
    document.getElementById("question").innerText = `Choose at least Level ${spell.minLevel}`;
  } else if (level) {
    setStatus(`${spell.name} is highlighted in your spellbook. Combat still draws a random playable card each cast.`);
    generateQuestion();
  } else {
    setStatus(`${spell.name} highlighted. Pick a level to begin drawing random combat cards.`);
  }
}

function updateSelectedSpell() {
  const spell = getScaledSpellStats(getCurrentSpell());
  const stats = getPlayerStats();
  const stance = getStanceConfig();
  const shared = getSharedSpellStats(spell);
  const preview = level ? Math.max(1, level * 8 + spell.baseDamage + stats.power + stance.damageBonus + Math.min(comboStreak * 2, 12) - currentEnemy.armor) : spell.baseDamage + stats.power + stance.damageBonus;
  const shell = document.querySelector(".selected-card-shell");
  if (shell) {
    shell.classList.remove("rank-3", "rank-5");
    if (spell.spellLevel >= 5) shell.classList.add("rank-5");
    else if (spell.spellLevel >= 3) shell.classList.add("rank-3");
  }
  document.getElementById("activeSpellName").innerText = spell.name;
  document.getElementById("selectedCardTag").innerText = `Drawn ${spell.rarity} Lv.${spell.spellLevel} ${spell.evolutionTier === 2 ? "Ascended" : spell.evolutionTier === 1 ? "Awakened" : "Spell"}`;
  document.getElementById("selectedCardName").innerText = spell.name;
  document.getElementById("selectedCardText").innerText = getBattleCardText(spell.text);
  document.getElementById("selectedCardRules").innerText = `Requires Level ${spell.minLevel} | ${formatSharedStatsInline(shared, { valuePrefix: "+", critSuffix: "%", recoverySuffix: "%" })}`;
  document.getElementById("selectedCardArt").innerHTML = getSpellArtMarkup(spell, "large");
  document.getElementById("spellDamage").innerText = preview;
  updateStanceButtons();
  if (document.getElementById("cardPopup").classList.contains("show")) {
    openCardPopup();
  }
}

function claimRelic(relicId) {
  const relic = relicChoices.find((item) => item.id === relicId);
  if (!relic) return;
  relic.apply();
  if (!ownedRelics.some((item) => item.id === relic.id)) {
    ownedRelics.push(relic);
  }
  relicChoices = [];
  document.getElementById("relicPanel").classList.remove("show");
  recalculatePlayerTotals(false);
  battleCount += 1;
  playerHP = Math.min(maxPlayerHP, playerHP + Math.round(maxPlayerHP * 0.18));
  renderSpellBook();
  updateHealthBars();
  loadNextEnemy();
  generateQuestion();
  showPhaseBanner("Relic Claimed", `${relic.name} now empowers the run.`, "heal");
  setStatus(`${relic.name} binds itself to your run.`);
  setCombatFeed(relic.text);
}

function generateQuestion() {
  if (!level) {
    currentAnswer = null;
    currentQuestionData = null;
    currentRuneTrial = null;
    selectedRuneChoice = null;
    document.getElementById("question").innerText = "Pick a level and a spell card";
    document.getElementById("questionTwist").innerText = "Ritual Twist: None";
    updateHintPanel();
    updateSelectedSpell();
    return;
  }

  drawCombatSpell();
  let spell = getScaledSpellStats(getCurrentSpell());
  const profile = getMathProfile();
  questionMisses = 0;

  if (level < spell.minLevel) {
    const playable = getPlayableSpellIds().find((id) => getScaledSpellStats(getSpellById(id)).minLevel <= level);
    if (playable) {
      currentSpellId = playable;
      spell = getScaledSpellStats(getCurrentSpell());
    }
  }

  let a;
  let b;
  let q;

  if (level === 1) {
    a = rand(profile.add.a[0], profile.add.a[1]);
    b = rand(profile.add.b[0], profile.add.b[1]);
    currentAnswer = a + b;
    currentQuestionData = { type: "add", a, b };
    q = `${a} + ${b}`;
  } else if (level === 2) {
    a = rand(profile.subtract.a[0], profile.subtract.a[1]);
    b = rand(profile.subtract.b[0], profile.subtract.b[1]);
    currentAnswer = a - b;
    currentQuestionData = { type: "subtract", a, b };
    q = `${a} - ${b}`;
  } else if (level === 3) {
    a = rand(profile.multiply.a[0], profile.multiply.a[1]);
    b = rand(profile.multiply.b[0], profile.multiply.b[1]);
    currentAnswer = a * b;
    currentQuestionData = {
      type: "multiply",
      a,
      b,
      repeatText: Array.from({ length: a }, () => b).join(" + ")
    };
    q = `${a} x ${b}`;
  } else if (level === 4) {
    b = rand(profile.divide.b[0], profile.divide.b[1]);
    currentAnswer = rand(profile.divide.answer[0], profile.divide.answer[1]);
    a = currentAnswer * b;
    currentQuestionData = { type: "divide", a, b };
    q = `${a} / ${b}`;
  } else {
    a = rand(profile.order.a[0], profile.order.a[1]);
    b = rand(profile.order.b[0], profile.order.b[1]);
    const c = rand(profile.order.c[0], profile.order.c[1]);
    currentAnswer = a * b + c;
    currentQuestionData = { type: "order", a, b, c };
    q = `${a} x ${b} + ${c}`;
  }

  document.getElementById("question").innerText = q;
  document.getElementById("answer").value = "";
  rollQuestionTwist();
  updateHintPanel();
  updateSelectedSpell();
}

function submitAnswer() {
  if (turnLocked) {
    setStatus("Wait for the enemy phase to finish.");
    return;
  }

  if (rewardChoices.length > 0 || deathChoices.length > 0 || milestoneChoices.length > 0 || relicChoices.length > 0) {
    setStatus("Choose your pending reward, blessing, or milestone boon before continuing.");
    return;
  }

  if (currentAnswer === null) {
    setStatus("Choose a valid level and spell before casting.");
    return;
  }

  const answerField = document.getElementById("answer");
  if (answerField.value.trim() === "") {
    setStatus("Enter an answer before casting.");
    return;
  }

  const user = Number(answerField.value);
  const answeredCorrectly = user === currentAnswer;
  const stats = getPlayerStats();
  const stance = getStanceConfig();
  const attackRoll = calculateDamage(null);
  let text = "";

  if (playerStatus.burn > 0) {
    const burnTick = playerStatus.burn;
    playerHP -= burnTick;
    playerStatus.burn = Math.max(0, playerStatus.burn - 1);
    text += ` Burn scorches you for ${burnTick}.`;
  }

  if (enemyStatus.burn > 0) {
    const enemyBurnTick = enemyStatus.burn;
    enemyHP -= enemyBurnTick;
    enemyStatus.burn = Math.max(0, enemyStatus.burn - 1);
    text += ` Enemy burn deals ${enemyBurnTick}.`;
  }

  if (answeredCorrectly) {
    comboStreak += 1;
    enemyHP -= attackRoll.value;
    animateElementClass(".enemy-stage", "shake", 200);
    animateElementClass(".enemy-sprite", "hit", 200);
    showFloatingText("enemyFloaters", `-${attackRoll.value}`, attackRoll.crit ? "buff" : "damage");
    playRetroTone(attackRoll.crit ? "phase" : "hit");
    score += attackRoll.value + Math.floor((battleCount - 1) / enemyRoster.length) * 5 + comboStreak;
    text = attackRoll.crit
      ? `Crit ${attackRoll.value}`
      : `Hit ${attackRoll.value}`;
    text += ` ${attackRoll.stanceName} stance adds ${attackRoll.comboBonus} combo damage.`;

    if (stats.lifesteal + attackRoll.extraLifesteal > 0) {
      const healPenalty = playerStatus.curse > 0 ? Math.min(0.5, playerStatus.curse * 0.15) : 0;
      const heal = Math.max(1, Math.round((attackRoll.value * (stats.lifesteal + attackRoll.extraLifesteal)) / 100 * (1 - healPenalty)));
      playerHP = Math.min(maxPlayerHP, playerHP + heal);
      showFloatingText("playerFloaters", `+${heal}`, "heal");
      playRetroTone("heal");
      text += ` You heal ${heal}.`;
    }

    const totalBarrier = attackRoll.barrierGain;
    if (totalBarrier > 0) {
      playerBarrier += totalBarrier;
      showFloatingText("playerFloaters", `Barrier +${totalBarrier}`, "buff");
      text += ` Barrier +${totalBarrier}.`;
    }

    const totalWeaken = attackRoll.weakenGain;
    if (totalWeaken > 0) {
      enemyWeaken += totalWeaken;
      enemyStatus.chill += 1;
      showFloatingText("enemyFloaters", `Weaken ${totalWeaken}`, "buff");
      text += ` Enemy attack weakened by ${totalWeaken}.`;
    }

    if (comboStreak > 0 && comboStreak % 3 === 0) {
      playerBarrier += 3;
      enemyWeaken += 1;
      showFloatingText("playerFloaters", "Combo Surge", "buff");
      showFloatingText("enemyFloaters", "Weaken 1", "buff");
      text += " Combo surge grants Barrier +3 and Weaken 1.";
    } else if (comboStreak >= 2) {
      showFloatingText("playerFloaters", `Combo ${comboStreak}`, "buff");
    }

    if (["ember", "nova", "meteor"].includes(getCurrentSpell().id)) {
      enemyStatus.burn += 1 + relicBonuses.burnBoost;
      text += ` Burn +${1 + relicBonuses.burnBoost}.`;
    }

    if (currentTwist?.id === "steady") {
      playerBarrier += 2;
      text += " Steady Sigil hardens your barrier.";
    }

    if (currentEnemy.thorns > 0) {
      const thornDamage = Math.max(1, currentEnemy.thorns - stats.ward);
      playerHP -= thornDamage;
      showFloatingText("playerFloaters", `-${thornDamage}`, "damage");
      text += ` Thorns strike back for ${thornDamage}.`;
    }

    maybeAdvanceEnemyPhase();

    if (attackRoll.crit) {
      pulsePanel("playerPanel", "crit-panel");
      pulsePanel("enemyPanel", "hit-panel");
      setCombatFeed(`Critical ${attackRoll.stanceName.toLowerCase()} magic tears through the battlefield. Combo ${comboStreak}.`);
    } else {
      pulsePanel("enemyPanel", "hit-panel");
      setCombatFeed(`Your ${getCurrentSpell().name} lands cleanly in ${attackRoll.stanceName.toLowerCase()} stance. Combo ${comboStreak}.`);
    }

    setStatus("Correct answer. Spell cast cleanly.");
  } else {
    comboStreak = 0;
    const mercyScale = currentTwist?.id === "mercy" ? 0.7 : 1;
    const greedyScale = currentTwist?.id === "greedy" ? 1.15 : 1;
    const reflected = Math.max(1, Math.round((attackRoll.value - stats.ward - attackRoll.wardBonus - relicBonuses.ward) * getEarlyBattleProtection() * attackRoll.reflectScale * mercyScale * greedyScale));
    playerHP -= reflected;
    animateElementClass("#playerCard", "flip", 340);
    showFloatingText("playerFloaters", `-${reflected}`, "damage");
    showFloatingText("playerFloaters", "Combo Lost", "damage");
    playRetroTone("miss");
    questionMisses += 1;
    const hintPanel = document.getElementById("hintPanel");
    hintPanel.style.display = "block";
    hintPanel.innerHTML = buildHintMarkup();
    text = `Reflect ${reflected}`;
    if (battleCount <= 2) {
      text += " Early-battle protection softens the blow.";
    }
    if (questionMisses === 1) {
      text += " A guided hint opens to help with the next try.";
    } else {
      text += " The hint now shows a worked example.";
    }
    text += ` ${stance.name} stance ${stance.reflectScale < 1 ? "softens" : "risks"} the backlash.`;
    pulsePanel("playerPanel", "hit-panel");
    setStatus("Wrong answer. The spell reflected back at you.");
    setCombatFeed("Your spell slips. The backlash bites, but the run still gives you room to learn.");
  }

  clampHealth();
  updateHealthBars();
  document.getElementById("score").innerText = score;

  if (enemyHP === 0) {
    if (embedMode) {
      setStatus("Enemy defeated.");
      setCombatFeed("The encounter breaks under your spellcraft.");
      notifyEmbedResult("win");
      return;
    }
    if (relicBonuses.cleanse) {
      playerStatus.curse = Math.max(0, playerStatus.curse - 1);
    }
    setStatus(currentEnemy.isBoss ? "Boss defeated. Claim a relic." : "Enemy defeated. Draft one of three spell cards.");
    setTimeout(() => {
      if (currentEnemy.isBoss) {
        showRelicChoices();
      } else {
        awardSpellChoices();
      }
    }, 420);
    return;
  }

  if (playerHP === 0) {
    setTimeout(() => {
      handleDefeat();
    }, 420);
    return;
  }

  const counterAttack = calculateEnemyAttack();
  runEnemyAttackPhase(counterAttack, text, answeredCorrectly, stance);
}

    notifyEmbedResult("lose");
    return;

function getRewardChoices() {
  const allowedRarities = getAllowedRarities();
  const eligibleSpells = spellPool.filter((spell) => allowedRarities.includes(spell.rarity));
  const pool = [...eligibleSpells];
  const picks = [];

  while (pool.length > 0 && picks.length < 3) {
    const index = rand(0, pool.length - 1);
    picks.push(pool.splice(index, 1)[0]);
  }

  if (picks.length < 3) {
    const fallback = eligibleSpells;
    fallback.forEach((spell) => {
      if (picks.length < 3 && !picks.some((item) => item.id === spell.id)) {
        picks.push(spell);
      }
    });
  }

  const potionChance = battleCount % 3 === 0 ? 60 : 30;
  if (rand(1, 100) <= potionChance) {
    const potion = potionPool[rand(0, potionPool.length - 1)];
    picks[rand(0, picks.length - 1)] = potion;
  }

  return picks;
}

function awardSpellChoices() {
  resetCard();
  rewardChoices = getRewardChoices();
  const rewardGrid = document.getElementById("rewardGrid");
  rewardGrid.innerHTML = "";

  rewardChoices.forEach((spell) => {
    const button = document.createElement("button");
    button.className = "reward-choice";
    button.onclick = () => claimReward(spell.id);
    button.innerHTML = spell.type === "potion" ? formatPotionCard(spell) : formatSpellCard(spell);
    rewardGrid.appendChild(button);
  });

  document.getElementById("rewardPanel").classList.add("show");
}

function claimReward(spellId) {
  if (rewardChoices.length === 0) {
    return;
  }

  const reward = rewardChoices.find((item) => item.id === spellId);
  if (!reward) {
    return;
  }

  let duplicateSpellReward = false;

  if (reward.type === "potion") {
    potionBonuses.power += reward.power;
    potionBonuses.ward += reward.ward;
    potionBonuses.focus += reward.focus;
    potionBonuses.vitality += reward.vitality;
    potionBonuses.lifesteal += reward.lifesteal;
  } else {
    if (!spellLevels[spellId]) {
      spellLevels[spellId] = 1;
    } else {
      duplicateSpellReward = true;
      spellLevels[spellId] += 1;
    }
    currentSpellId = spellId;
  }

  rewardChoices = [];
  document.getElementById("rewardPanel").classList.remove("show");

  recalculatePlayerTotals(true);
  battleCount += 1;
  playerHP = Math.min(maxPlayerHP, playerHP + Math.round(maxPlayerHP * 0.15) + (reward.health || 0));

  let extraMessage = "";
  if (battleCount % 3 === 0) {
    const milestoneHeal = Math.round(maxPlayerHP * 0.2);
    playerHP = Math.min(maxPlayerHP, playerHP + milestoneHeal);
    extraMessage = ` A moonwell restores ${milestoneHeal} HP before the next battle.`;
  }

  renderSpellBook();
  updateHealthBars();
  const rewardMessage =
    reward.type === "potion"
      ? `${reward.name} restored your strength and left a permanent blessing behind.${extraMessage}`
      : duplicateSpellReward
        ? `${getCurrentSpell().name} rose to rank ${getSpellLevel(spellId)} and grew stronger.${getSpellLevel(spellId) === 3 || getSpellLevel(spellId) === 5 ? " It evolved." : ""}${extraMessage}`
        : `You claimed ${getCurrentSpell().name}. Your permanent bonuses grew and you recovered some HP.${extraMessage}`;

  if (battleCount % 4 === 0) {
    document.getElementById("rewardPanel").classList.remove("show");
    showMilestoneChoices();
    setCombatFeed("A milestone chamber opens between battles.");
    return;
  }

  loadNextEnemy();
  generateQuestion();
  setStatus(rewardMessage);
  setCombatFeed("New power settles into your spellbook.");
}

function loadNextEnemy() {
  enemyIndex = (battleCount - 1) % enemyRoster.length;
  const cycle = Math.floor((battleCount - 1) / enemyRoster.length);
  const baseEnemy = enemyRoster[enemyIndex];
  const isBossBattle = !embedMode && battleCount > 0 && battleCount % 5 === 0;
  const gameProfile = getGameProfile();
  const scaledArmor = baseEnemy.armor + Math.floor(cycle / 1.5);
  const scaledThorns = baseEnemy.thorns + Math.floor(cycle / 2);
  const scaledFury = baseEnemy.fury + Math.floor((cycle + 1) / 2);
  const rawAttack = baseEnemy.attack + cycle * 4 + Math.floor((battleCount - 1) / 2) + (isBossBattle ? 6 : 1);
  const rawHP = baseEnemy.maxHP + cycle * 28 + (battleCount - 1) * 4 + (isBossBattle ? 85 : 0);
  const scaledAttack = Math.max(1, Math.round(rawAttack * gameProfile.enemyAttackScale));
  maxEnemyHP = Math.max(40, Math.round(rawHP * gameProfile.enemyHpScale));
  enemyHP = maxEnemyHP;
  enemyAttack = scaledAttack;
  currentEnemy = {
    ...baseEnemy,
    baseName: baseEnemy.name,
    name: isBossBattle ? `${baseEnemy.name} Boss` : baseEnemy.name,
    armor: scaledArmor,
    thorns: scaledThorns + (isBossBattle ? 1 : 0),
    fury: scaledFury + (isBossBattle ? 1 : 0),
    attack: scaledAttack,
    isBoss: isBossBattle,
    phase: 1,
    baseBonusText: baseEnemy.bonusText,
    phaseText: cycle >= 2 ? "Escalating hunt" : "",
    bonusText: `${baseEnemy.bonusText} Tier bonuses: +${scaledArmor - baseEnemy.armor} armor, +${scaledThorns - baseEnemy.thorns} thorns, +${scaledFury - baseEnemy.fury} fury.${isBossBattle ? " Boss traits: stronger attacks, relic reward, and heavier status pressure." : ""}`
  };
  enemyTurnCount = 0;
  enemyWeaken = 0;
  comboStreak = 0;
  enemyStatus = { burn: 0, chill: 0 };
  nextEnemyMove = planEnemyMove();
  document.getElementById("enemyName").innerText = currentEnemy.name;
  document.getElementById("enemyFlavor").innerText = `${currentEnemy.flavor} ${getCurrentBiome().flavor}`;
  document.getElementById("enemyAttackText").innerText = `Enemy attack: ${enemyAttack}`;
  document.getElementById("enemyIntentText").innerText = getEnemyIntentText();
  updateIntentChip();
  updateEnemyModel();
  updateBiomeTheme();
  document.getElementById("battleCount").innerText = battleCount;
  renderEnemyStats();
  if (!currentEnemy.isBoss && battleCount > 1 && (battleCount - 1) % 5 === 0) {
    showPhaseBanner("Checkpoint", `Battle ${battleCount} begins. The climb is getting harsher.`, "phase");
  }
  if (currentEnemy.isBoss) {
    pulseBossWarning();
    showPhaseBanner("Boss Fight", `${currentEnemy.name} enters with ${nextEnemyMove.label}.`, "boss");
  } else if (nextEnemyMove?.label === "Boss Cataclysm" || nextEnemyMove?.label === "Boss Guardbreak") {
    pulseBossWarning();
    showPhaseBanner("Boss Warning", `${currentEnemy.name} is preparing ${nextEnemyMove.label}.`, "boss");
  }
}

function clampHealth() {
  if (enemyHP < 0) enemyHP = 0;
  if (enemyHP > maxEnemyHP) enemyHP = maxEnemyHP;
  if (playerHP < 0) playerHP = 0;
  if (playerHP > maxPlayerHP) playerHP = maxPlayerHP;
}

function updateHealthBars() {
  const enemyPercent = (enemyHP / maxEnemyHP) * 100;
  const playerPercent = (playerHP / maxPlayerHP) * 100;
  document.getElementById("enemyHealth").style.width = `${enemyPercent}%`;
  document.getElementById("enemyHPText").innerText = `HP: ${enemyHP} / ${maxEnemyHP}`;
  document.getElementById("playerHealth").style.width = `${playerPercent}%`;
  document.getElementById("playerHPText").innerText = `HP: ${playerHP} / ${maxPlayerHP}`;
  renderPlayerStats();
}

function resetCard(hideHint = true) {
  document.getElementById("playerCard").classList.remove("flip");
  document.getElementById("answer").value = "";
  updateTurnOrder("Your Turn -> Solve and cast");
  if (hideHint) {
    document.getElementById("hintPanel").style.display = "none";
  }
}

function resetRun() {
  level = 0;
  score = 0;
  currentAnswer = null;
  currentQuestionData = null;
  questionMisses = 0;
  mathDifficulty = "normal";
  currentSpellId = "spark";
  spellLevels = { spark: 1 };
  rewardChoices = [];
  deathChoices = [];
  milestoneChoices = [];
  relicChoices = [];
  ownedRelics = [];
  battleCount = 1;
  enemyIndex = 0;
  enemyTurnCount = 0;
  playerBarrier = 0;
  enemyWeaken = 0;
  currentStance = "burst";
  comboStreak = 0;
  currentTwist = null;
  currentRuneTrial = null;
  selectedRuneChoice = null;
  nextEnemyMove = null;
  gameLogEntries = ["A new run begins."];
  gameLogPage = 0;
  potionBonuses = { power: 0, ward: 0, focus: 0, vitality: 0, lifesteal: 0 };
  relicBonuses = { power: 0, ward: 0, focus: 0, vitality: 0, lifesteal: 0, barrier: 0, burnBoost: 0, bossWard: 0, combo: 0, crit: 0, cleanse: false };
  playerStatus = { burn: 0, curse: 0, freeze: 0 };
  enemyStatus = { burn: 0, chill: 0 };
  currentEnemy = enemyRoster[0];
  maxPlayerHP = basePlayerMaxHP + getPlayerStats().vitality;
  playerHP = maxPlayerHP;
  maxEnemyHP = currentEnemy.maxHP;
  enemyHP = maxEnemyHP;
  enemyAttack = currentEnemy.attack;
  updateTurnOrder("Your Turn -> Solve and cast");
  if (embedEnemyConfig) {
    currentEnemy = { ...embedEnemyConfig, baseName: embedEnemyConfig.name, isBoss: false, phase: 1, baseBonusText: embedEnemyConfig.bonusText };
    maxEnemyHP = currentEnemy.maxHP;
    enemyHP = maxEnemyHP;
    enemyAttack = currentEnemy.attack;
    enemyTurnCount = 0;
    enemyWeaken = 0;
    nextEnemyMove = planEnemyMove();
    document.getElementById("enemyName").innerText = currentEnemy.name;
    document.getElementById("enemyFlavor").innerText = currentEnemy.flavor;
    document.getElementById("enemyAttackText").innerText = `Enemy attack: ${enemyAttack}`;
    document.getElementById("enemyIntentText").innerText = getEnemyIntentText();
  } else {
    loadNextEnemy();
  }

  document.getElementById("level").innerText = "-";
  document.getElementById("mathMode").innerText = "Normal";
  document.getElementById("battleCount").innerText = "1";
  document.getElementById("score").innerText = "0";
  document.getElementById("rewardPanel").classList.remove("show");
  document.getElementById("deathPanel").classList.remove("show");
  document.getElementById("milestonePanel").classList.remove("show");
  document.getElementById("relicPanel").classList.remove("show");
  if (embedMode) {
    document.querySelector(".subtitle").innerText = "Areen Final Math encounter mode. Dark fantasy spell duels with bosses, relics, evolved spells, and biome shifts.";
  }

  renderEnemyStats();
  renderSpellBook();
  renderRelics();
  renderGameLog();
updateMathDifficultyButtons();
updateGameDifficultyButtons();
  updateStanceButtons();
  updateBiomeTheme();
  resetCard();
  updateHealthBars();
  generateQuestion();
  setStatus(embedMode ? "Pick a level and solve to cast." : "Areen Final Math: pick your settings, choose a level, and start the duel.");
  setCombatFeed("The duel is ready.");
}

function setStatus(message) {
  document.getElementById("statusText").innerText = message;
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

document.getElementById("answer").addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    submitAnswer();
  }
});

document.addEventListener("keydown", handleDevShortcut);
document.getElementById("tutorialNext").addEventListener("click", nextTutorialStep);
document.getElementById("tutorialSkip").addEventListener("click", () => closeTutorial(true));

resetRun();
if (!embedMode && localStorage.getItem("enzo4-tutorial-seen") !== "1") {
  openTutorial();
}
</script>
