// &#226;”€&#226;”€ KNN &#226;”€&#226;”€
function KNN(k){this.k=k||3;this.data=[];}
KNN.prototype.fit=function(X,y){this.data=X.map(function(f,i){return{f:f,y:y[i]};});};

if(!this.data.length)return 0.5;

};
function euc(a,b){var s=0;for(var i=0;i&lt;a.length;i++)s+=(a[i]-b[i])*(a[i]-b[i]);return Math.sqrt(s);}
function feat(cv){var S=20,o=document.createElement(&#39;canvas&#39;);o.width=S;o.height=S;var c=o.getContext(&#39;2d&#39;);c.drawImage(cv,0,0,S,S);var d=c.getImageData(0,0,S,S).data,f=[];for(var i=0;i&lt;d.length;i+=4)f.push((d[i]*.299+d[i+1]*.587+d[i+2]*.114)/255);return f;}

// &#226;”€&#226;”€ UI helpers &#226;”€&#226;”€

function flashCast(col){var el=document.getElementById(&#39;castFlash&#39;);el.style.background=&#39;radial-gradient(ellipse at 50% 50%,&#39;+col+&#39; 0%,transparent 70%)&#39;;el.style.opacity=&#39;1&#39;;setTimeout(function(){el.style.opacity=&#39;0&#39;;},150);}

// &#226;”€&#226;”€ HUD &#226;”€&#226;”€
function updateHUD(){

var l=Math.min(G.lvl-1,LXP.length-1),n2=Math.min(G.lvl,LXP.length-1);

G.lvl++;

}

// &#226;”€&#226;”€ Bias &#226;”€&#226;”€
function getBias(si){var n=G.samp[si].length,mx=MSLOT[G.lvl-1];return n?Math.max(0.1,1-n/(mx+2)):1.0;}
function updateBias(){
var b=(getBias(0)+getBias(1))/2,pct=Math.round(b*100);
document.getElementById(&#39;biasFill&#39;).style.width=pct+&#39;%&#39;;
var col,lbl,txt;
if(b&gt;0.65){col=&#39;#ff4444&#39;;lbl=&#39;HIGH&#39;;txt=&#39;Your AI has seen very few examples &#226;€” expect misfires and partial casts.&#39;;}
else if(b&gt;0.35){col=&#39;#ffaa00&#39;;lbl=&#39;MODERATE&#39;;txt=&#39;Getting better! More varied samples help the AI generalise.&#39;;}
else{col=&#39;#44dd88&#39;;lbl=&#39;LOW&#39;;txt=&#39;Good coverage. Bias never fully disappears &#226;€” there are always edge cases.&#39;;}
document.getElementById(&#39;biasFill&#39;).style.background=col;
document.getElementById(&#39;biasVal&#39;).style.color=col;
document.getElementById(&#39;biasVal&#39;).textContent=lbl;
document.getElementById(&#39;biasTxt&#39;).textContent=txt;
var b0=getBias(0),n0=document.getElementById(&#39;bn0&#39;);
if(n0){n0.textContent=b0&gt;.6?&#39;High bias &#226;€” will likely fizzle.&#39;:b0&gt;.3?&#39;Moderate bias &#226;€” sometimes misfires.&#39;:&#39;Low bias &#226;€” fairly reliable.&#39;;n0.style.color=b0&gt;.6?&#39;#ff4444&#39;:b0&gt;.3?&#39;#ffaa00&#39;:&#39;#44dd88&#39;;}
}

// &#226;”€&#226;”€ Spell casting &#226;”€&#226;”€
function castFireball(){
var si=0,bias=getBias(si);

var eff=Math.max(0,Math.min(1,conf+(Math.random()-.5)*bias*1.2));
if(eff&lt;0.25){

} else if(eff&lt;0.55){
showToast(&#39;&#226;š&#161; Partial cast &#226;€” bias weakened it&#39;);
showBiasHint(&#39;Partial success! More samples reduce this unpredictability.&#39;);
flashCast(&#39;rgba(255,106,0,0.2)&#39;); gainXP(5);
} else {
showToast(&#39;&#240;Ÿ”&#165; Fireball!&#39;,&#39;xp&#39;); flashCast(&#39;rgba(255,106,0,0.4)&#39;); gainXP(15);
if(cam &amp;&amp; distFP()&lt;14+G.par[0].radius) lightFire();
else showBiasHint(&#39;Too far from the fire pit! Skate closer, then cast.&#39;);
}
}

// &#226;”€&#226;”€ Spellbook &#226;”€&#226;”€
var aTab=0,drw=[false,false],lp=[{x:0,y:0},{x:0,y:0}];
function initSpellbook(){
[0,1].forEach(function(si){
clearDC(si);
var cv=document.getElementById(&#39;dc&#39;+si);
cv.addEventListener(&#39;mousedown&#39;,function(e){drw[si]=true;lp[si]=gpos(cv,e);dotDraw(si);});
cv.addEventListener(&#39;mousemove&#39;,function(e){if(drw[si])lineDraw(si,cv,e);});

cv.addEventListener(&#39;touchstart&#39;,function(e){e.preventDefault();drw[si]=true;lp[si]=gpos(cv,e);dotDraw(si);},{passive:false});
cv.addEventListener(&#39;touchmove&#39;,function(e){e.preventDefault();if(drw[si])lineDraw(si,cv,e);},{passive:false});
cv.addEventListener(&#39;touchend&#39;,function(){drw[si]=false;});
renderSlots(si); renderParams(si);
});
updateBias();
document.getElementById(&#39;tab0&#39;).addEventListener(&#39;click&#39;,function(){swTab(0);});
document.getElementById(&#39;tab1&#39;).addEventListener(&#39;click&#39;,function(){swTab(1);});
document.getElementById(&#39;btnClr&#39;).addEventListener(&#39;click&#39;,function(){clearDC(aTab);});
document.getElementById(&#39;btnAdd&#39;).addEventListener(&#39;click&#39;,addSamp);
document.getElementById(&#39;btnSeal&#39;).addEventListener(&#39;click&#39;,sealSpell);
document.getElementById(&#39;sbClose&#39;).addEventListener(&#39;click&#39;,toggleSB);
document.getElementById(&#39;spellBtn&#39;).addEventListener(&#39;click&#39;,toggleSB);
document.getElementById(&#39;winCont&#39;).addEventListener(&#39;click&#39;,function(){document.getElementById(&#39;winScreen&#39;).style.display=&#39;none&#39;;});
}
function gpos(cv,e){var r=cv.getBoundingClientRect(),sx=cv.width/r.width,sy=cv.height/r.height,s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*sx,y:(s.clientY-r.top)*sy};}
function dotDraw(si){var cv=document.getElementById(&#39;dc&#39;+si),c=cv.getContext(&#39;2d&#39;);c.beginPath();c.arc(lp[si].x,lp[si].y,5,0,Math.PI*2);c.fillStyle=SPC[si].dc;c.shadowColor=SPC[si].dc;c.shadowBlur=8;c.fill();c.shadowBlur=0;}
function lineDraw(si,cv,e){var p=gpos(cv,e),c=cv.getContext(&#39;2d&#39;);c.beginPath();c.moveTo(lp[si].x,lp[si].y);c.lineTo(p.x,p.y);c.strokeStyle=SPC[si].dc;c.lineWidth=8;c.lineCap=&#39;round&#39;;c.shadowColor=SPC[si].dc;c.shadowBlur=10;c.stroke();c.shadowBlur=0;lp[si]=p;}
function clearDC(si){var cv=document.getElementById(&#39;dc&#39;+si),c=cv.getContext(&#39;2d&#39;);c.fillStyle=&#39;#060e1c&#39;;c.fillRect(0,0,cv.width,cv.height);c.strokeStyle=&#39;rgba(168,216,234,0.05)&#39;;c.lineWidth=1;for(var x=0;x&lt;cv.width;x+=25){c.beginPath();c.moveTo(x,0);c.lineTo(x,cv.height);c.stroke();}for(var y=0;y&lt;cv.height;y+=25){c.beginPath();c.moveTo(0,y);c.lineTo(cv.width,y);c.stroke();}}
function hasDraw(si){var d=document.getElementById(&#39;dc&#39;+si).getContext(&#39;2d&#39;).getImageData(0,0,368,148).data;for(var i=0;i&lt;d.length;i+=4)if(d[i]&gt;15||d[i+1]&gt;15||d[i+2]&gt;15)return true;return false;}
function swTab(si){aTab=si;[0,1].forEach(function(i){document.getElementById(&#39;tab&#39;+i).classList.toggle(&#39;on&#39;,i===si);document.getElementById(&#39;panel&#39;+i).classList.toggle(&#39;hide&#39;,i!==si);});}
function addSamp(){
var si=aTab;
if(!hasDraw(si)){showToast(&#39;Draw the gesture first!&#39;);return;}
if(G.samp[si].length&gt;=MSLOT[G.lvl-1]){showToast(&#39;Level up to unlock more slots!&#39;);return;}

var th=document.createElement(&#39;canvas&#39;);th.width=34;th.height=34;th.getContext(&#39;2d&#39;).drawImage(cv,0,0,34,34);

function trainSpell(si){

var knn=new KNN(Math.max(1,Math.min(3,G.samp[si].length)));
knn.fit(G.samp[si].map(function(s){return s.f;}),G.samp[si].map(function(){return 1;}));

}

info.innerHTML=&#39;&lt;div class=&quot;slot-lbl&quot;&gt;SAMPLE &#39;+(i+1)+&#39;&lt;/div&gt;&lt;div class=&quot;slot-st&quot;&gt;&#39;+(filled?&#39;&#226;œ“ inscribed&#39;:locked?&#39;&#240;Ÿ”’ lvl &#39;+(i+1):&#39;empty&#39;)+&#39;&lt;/div&gt;&#39;;

function renderParams(si){

SPC[si].params.forEach(function(p){
var v=G.par[si][p.key],row=document.createElement(&#39;div&#39;);row.className=&#39;param-row&#39;;
row.innerHTML=&#39;&lt;div class=&quot;param-lbl&quot;&gt;&lt;span&gt;&#39;+p.label+&#39;&lt;/span&gt;&lt;span class=&quot;param-v&quot; id=&quot;pv_&#39;+si+&#39;_&#39;+p.key+&#39;&quot;&gt;&#39;+v+p.unit+&#39;&lt;/span&gt;&lt;/div&gt;&lt;input class=&quot;param-sl&quot; type=&quot;range&quot; min=&quot;&#39;+p.min+&#39;&quot; max=&quot;&#39;+p.max+&#39;&quot; value=&quot;&#39;+v+&#39;&quot; data-si=&quot;&#39;+si+&#39;&quot; data-k=&quot;&#39;+p.key+&#39;&quot; data-u=&quot;&#39;+p.unit+&#39;&quot;&gt;&#39;;

c.querySelectorAll(&#39;.param-sl&#39;).forEach(function(sl){

});
}

.question {
  font-size: 1.2rem;
  color: #d8d8d8;
  text-shadow: none;
  margin: 20px 0 12px;
}

input {
  max-width: 390px;
  width: 100%;
  background: #b6b6b6;
  color: #505050;
  border: 4px solid #8a8a8a;
  box-shadow: inset -4px -4px 0 #d8d8d8, inset 4px 4px 0 #7a7a7a;
  font-size: 1.6rem;
  padding: 18px 14px;
  border-radius: 0;
  font-weight: bold;
  text-transform: uppercase;
}

input::placeholder {
  color: #5d5d5d;
  text-transform: uppercase;
}

#playerPanel .card-face.front {
  align-items: stretch;
}

#playerPanel .card-face.front > * {
  text-align: left;
}

.selected-card-shell {
  display: grid;
  grid-template-rows: 54% 46%;
  gap: 0;
  height: 100%;
}

.selected-card-art {
  min-height: 0;
  padding: 8px 8px 6px;
  background: rgba(228, 212, 176, 0.16);
  border: 3px solid #7b4a1f;
  box-shadow:
    inset 0 0 0 2px rgba(237, 202, 126, 0.22),
    inset 0 -4px 0 rgba(0,0,0,0.14);
}

.selected-card-copy {
  min-height: 0;
  padding: 7px 8px 6px;
  background: linear-gradient(180deg, rgba(97, 55, 20, 0.96), rgba(59, 28, 9, 0.96));
  border: 3px solid #7b3c10;
  border-top: 0;
  color: #f0e7d8;
  display: flex;
  flex-direction: column;
  gap: 5px;
  box-shadow: inset 0 0 0 2px rgba(209, 145, 78, 0.18);
  justify-content: flex-start;
  overflow: hidden;
}

.selected-card-name {
  font-size: 0.78rem;
  line-height: 1.15;
  color: #fff4dd;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.35);
}

.selected-card-tag {
  display: inline-flex;
  align-self: flex-start;
  padding: 3px 6px;
  background: #3a1b0c;
  border: 2px solid #9a6a31;
  font-size: 0.54rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #f3cf8e;
}

.selected-card-text {
  font-size: 0.64rem;
  line-height: 1.28;
  overflow: hidden;
  color: #f1e7d7;
}

.selected-card-rules {
  display: block;
  font-size: 0.62rem;
  line-height: 1.18;
  color: #d6c8b1;
}

.card-popup-trigger {
  margin-top: 6px;
  width: min(100%, 220px);
  padding: 7px 8px;
  background: #6a3d12;
  border: 3px solid #a56c2f;
  color: #e9f2ff;
  font-family: inherit;
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
}

.spell-art {
  position: relative;
  overflow: hidden;
  border: 3px solid rgba(244, 205, 126, 0.24);
  background:
    linear-gradient(180deg, rgba(11, 18, 34, 0.8), rgba(26, 12, 18, 0.82)),
    radial-gradient(circle at 50% 20%, rgba(255, 210, 124, 0.18), transparent 56%);
  box-shadow: inset 0 0 0 2px rgba(9, 8, 13, 0.45);
  image-rendering: pixelated;
}

.spell-art::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(180deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 12px 12px;
  opacity: 0.18;
  pointer-events: none;
}

.spell-art::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    180deg,
    rgba(0, 0, 0, 0.02) 0 6px,
    rgba(0, 0, 0, 0.14) 6px 12px
  );
  mix-blend-mode: multiply;
  opacity: 0.42;
  pointer-events: none;
}

.spell-art.large {
  min-height: 100%;
  height: 100%;
}

.spell-art.small {
  height: 110px;
  margin: 8px 0 10px;
}

.art-bg,
.art-core,
.art-detail,
.art-ring,
.art-glow,
.art-spark,
.art-accent {
  position: absolute;
}

.art-bg {
  inset: 8% 8%;
  border-radius: 14px;
  opacity: 0.88;
}

.art-core {
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

.art-detail,
.art-ring,
.art-glow,
.art-spark,
.art-accent {
  pointer-events: none;
}

.art-caption {
  position: absolute;
  left: 10px;
  right: 10px;
  bottom: 8px;
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(244, 233, 220, 0.76);
  text-shadow: 0 1px 0 rgba(0, 0, 0, 0.5);
}

.card-copy {
  display: block;
  margin-top: 8px;
  color: #d6cec1;
  line-height: 1.45;
}

#playerPanel .cast-button {
  background: transparent;
  border: none;
  box-shadow: none;
  color: rgba(216,216,216,0.5);
  font-size: 1.15rem;
  padding: 8px 0;
}

#playerPanel .cast-button:hover {
  filter: none;
  color: #d8d8d8;
}

#hintPanel {
  background: rgba(0,0,0,0.32);
  border: 2px solid rgba(180,180,180,0.14);
}

.info {
  width: min(100%, 440px);
  margin: 8px auto 0;
  text-align: left;
  color: #d9d9d9;
  font-size: 0.82rem;
}

.info br:nth-of-type(-n+3) {
  display: none;
}

#playerHPText,
#enemyHPText {
  font-size: 0.88rem;
  letter-spacing: 0.06em;
  color: #d8d8d8;
}

.health-bar {
  border: none;
  background: transparent;
  height: 14px;
  border-radius: 0;
  overflow: visible;
  position: relative;
}

#playerHealth,
#enemyHealth {
  border-radius: 0;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
}

.health-bar::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(90deg, rgba(0,0,0,0.2) 0 18px, transparent 18px 22px);
  pointer-events: none;
}

#playerHealth {
  background: #8db14c;
}

#enemyHealth {
  background: #ff140a;
}

#playerPanel {
  justify-self: start;
}

#playerPanel #activeSpellName {
  margin: 0 auto 10px;
  width: min(100%, 250px);
  text-align: center;
}

#enemyPanel {
  text-align: center;
  justify-self: end;
}

.duel-panel {
  align-self: center;
  width: 100%;
  max-width: 420px;
  justify-self: center;
}

.duel-stack {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  margin-top: 66px;
}

.rune-panel {
  width: 100%;
  max-width: 420px;
  padding: 10px 12px;
  background: rgba(26, 12, 8, 0.88);
  border: 3px solid #7e4a1d;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.28);
}

.rune-label {
  color: #f0d29a;
  font-size: 0.74rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.rune-prompt {
  margin-top: 6px;
  color: #d9d4cb;
  font-size: 0.78rem;
  line-height: 1.5;
  min-height: 2.3em;
}

.rune-row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  margin-top: 10px;
}

.rune-button {
  min-height: 46px;
  border: 3px solid #6b3c17;
  background: #2e160c;
  color: #dcd7cf;
  font-family: inherit;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.25);
  cursor: pointer;
}

.rune-button:hover {
  filter: brightness(1.08);
}

.rune-button.selected {
  background: #7d3d12;
  border-color: #db9a46;
  color: #fff2d8;
  transform: translate(-1px, -1px);
}

.rune-readout {
  margin-top: 8px;
  color: #bcae97;
  font-size: 0.68rem;
  min-height: 1.4em;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.stance-row {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 6px;
  margin-top: 4px;
}

.stance-button {
  min-height: 56px;
  padding: 6px 8px;
  border: 3px solid #7e4a1d;
  background: #3f1c0d;
  color: #d8d8d8;
  text-transform: uppercase;
  font-family: inherit;
  letter-spacing: 0.08em;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.28);
  cursor: pointer;
}

.stance-button strong {
  display: block;
  font-size: 0.72rem;
}

.stance-button span {
  display: block;
  margin-top: 2px;
  font-size: 0.5rem;
  line-height: 1.2;
  color: rgba(216,216,216,0.72);
}

.stance-button.selected {
  background: #7d3d12;
  border-color: #db9a46;
  color: #fff1d3;
  transform: translate(-1px, -1px);
}

.stance-readout {
  width: 100%;
  text-align: center;
  color: #cda56f;
  font-size: 0.66rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.duel-panel .question {
  max-width: 420px;
  margin: 10px 0 8px;
}

.duel-panel .cast-button {
  background: transparent;
  border: none;
  box-shadow: none;
  color: rgba(216,216,216,0.5);
  font-size: 1rem;
  padding: 4px 0;
  font-family: inherit;
}

.duel-panel .cast-button:hover {
  filter: none;
  color: #d8d8d8;
}

.enemy-card {
  display: none;
}

.enemy-stage {
  position: relative;
  width: 208px;
  height: 258px;
  margin: 10px auto 8px;
  image-rendering: pixelated;
  filter: drop-shadow(8px 8px 0 rgba(0, 0, 0, 0.26));
}

.enemy-stage::before {
  content: "";
  position: absolute;
  inset: 22px 16px 26px;
  background:
    repeating-linear-gradient(180deg, rgba(0,0,0,0.02) 0 8px, rgba(0,0,0,0.18) 8px 16px),
    radial-gradient(circle at 50% 28%, rgba(171, 77, 29, 0.18), transparent 56%);
  border: 3px solid rgba(126, 74, 29, 0.42);
  pointer-events: none;
}

.enemy-stage.shake {
  animation: panelShake 0.18s steps(2);
}

.enemy-stage.phase-flash::after {
  content: "";
  position: absolute;
  inset: 18px 12px 22px;
  border: 4px solid rgba(255, 193, 96, 0.72);
  animation: pixelPulse 0.4s steps(3);
  pointer-events: none;
}

.enemy-shadow {
  position: absolute;
  left: 50%;
  bottom: 18px;
  width: 128px;
  height: 54px;
  transform: translateX(-50%);
  background: #363636;
  border-radius: 50%;
}

.enemy-sprite {
  position: absolute;
  left: 50%;
  bottom: 50px;
  width: 82px;
  height: 160px;
  transform: translateX(-50%);
  image-rendering: pixelated;
  filter: saturate(0.98) contrast(1.08) drop-shadow(4px 4px 0 rgba(0,0,0,0.34));
}

.enemy-sprite.hit {
  animation: spriteJolt 0.18s steps(2);
}

.enemy-sprite.attack {
  animation: spriteLunge 0.22s steps(2);
}

.enemy-sprite.phase-2 {
  filter: saturate(1.08) contrast(1.08) brightness(1.08);
}

.enemy-sprite.phase-3 {
  filter: saturate(1.15) contrast(1.14) brightness(1.14);
}

.floating-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 6;
}

.floating-text {
  position: absolute;
  left: 50%;
  top: 54%;
  transform: translate(-50%, 0);
  font-size: 1rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #f0e5d2;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.72);
  animation: floatFade 0.9s steps(8) forwards;
  white-space: nowrap;
}

.floating-text.damage {
  color: #ff7f6c;
}

.floating-text.heal {
  color: #9fd87c;
}

.floating-text.buff {
  color: #f2cb7f;
}

.floating-text.phase {
  color: #ffd89c;
  top: 30%;
}

.enemy-sprite .part {
  position: absolute;
  image-rendering: pixelated;
}

.enemy-sprite .head {
  width: 22px;
  height: 18px;
  left: 36px;
  top: 0;
  background: #c6bf3d;
  box-shadow: 0 0 0 4px #776d18;
}

.enemy-sprite .torso {
  width: 46px;
  height: 60px;
  left: 24px;
  top: 20px;
  background: #5a2b08;
  box-shadow: 0 0 0 6px #4a2105;
}

.enemy-sprite .arm-left,
.enemy-sprite .arm-right {
  width: 12px;
  height: 56px;
  top: 34px;
  background: #c6bf3d;
}

.enemy-sprite .arm-left {
  left: 10px;
  transform: rotate(20deg);
}

.enemy-sprite .arm-right {
  right: 8px;
  transform: rotate(-8deg);
}

.enemy-sprite .blade {
  width: 10px;
  height: 54px;
  left: -18px;
  top: 58px;
  background: #c7c7c7;
  transform: rotate(42deg);
  box-shadow: 0 0 0 2px #8a8a8a;
}

.enemy-sprite .leg-left,
.enemy-sprite .leg-right {
  width: 16px;
  height: 68px;
  top: 92px;
  background: #6f4b23;
}

.enemy-sprite .leg-left {
  left: 30px;
  transform: rotate(6deg);
}

.enemy-sprite .leg-right {
  right: 24px;
  transform: rotate(-4deg);
}

.enemy-sprite .foot-left,
.enemy-sprite .foot-right {
  width: 26px;
  height: 12px;
  top: 158px;
  background: #b28753;
}

.enemy-sprite .foot-left { left: 20px; }
.enemy-sprite .foot-right { right: 12px; }

.enemy-sprite .horn-left,
.enemy-sprite .horn-right,
.enemy-sprite .cloak,
.enemy-sprite .tail,
.enemy-sprite .aura {
  display: none;
}

.enemy-sprite.model-goblin .head {
  background: #c6bf3d;
  box-shadow: 0 0 0 4px #776d18;
}

.enemy-sprite.model-goblin .torso {
  background: #5a2b08;
  box-shadow: 0 0 0 6px #4a2105;
}

.enemy-sprite.model-bone .head {
  width: 24px;
  height: 20px;
  left: 35px;
  background: #d8d4cb;
  box-shadow: 0 0 0 4px #8e8a84;
}

.enemy-sprite.model-bone .torso {
  width: 42px;
  left: 26px;
  background: #4e525d;
  box-shadow: 0 0 0 6px #2d313b;
}

.enemy-sprite.model-bone .arm-left,
.enemy-sprite.model-bone .arm-right,
.enemy-sprite.model-bone .leg-left,
.enemy-sprite.model-bone .leg-right {
  background: #d8d4cb;
}

.enemy-sprite.model-bone .blade {
  height: 62px;
  background: #f0f3f7;
  box-shadow: 0 0 0 2px #9199a1;
}

.enemy-sprite.model-witch .head {
  width: 18px;
  height: 22px;
  left: 38px;
  background: #89b06a;
  box-shadow: 0 0 0 4px #4d6a39;
}

.enemy-sprite.model-witch .torso {
  width: 50px;
  height: 66px;
  left: 22px;
  background: #4f274d;
  box-shadow: 0 0 0 6px #2d1230;
}

.enemy-sprite.model-witch .arm-left,
.enemy-sprite.model-witch .arm-right {
  background: #89b06a;
}

.enemy-sprite.model-witch .blade {
  display: none;
}

.enemy-sprite.model-witch .cloak {
  display: block;
  width: 76px;
  height: 88px;
  left: 9px;
  top: 36px;
  background: #2c1430;
  clip-path: polygon(12% 0, 88% 0, 100% 100%, 0 100%);
}

.enemy-sprite.model-drake .head {
  width: 28px;
  height: 20px;
  left: 33px;
  background: #d57b28;
  box-shadow: 0 0 0 4px #79310c;
}

.enemy-sprite.model-drake .torso {
  width: 54px;
  height: 74px;
  left: 20px;
  background: #7b2e0f;
  box-shadow: 0 0 0 6px #4b1808;
}

.enemy-sprite.model-drake .arm-left,
.enemy-sprite.model-drake .arm-right {
  width: 18px;
  height: 64px;
  background: #d57b28;
}

.enemy-sprite.model-drake .blade {
  display: none;
}

.enemy-sprite.model-drake .horn-left,
.enemy-sprite.model-drake .horn-right {
  display: block;
  width: 10px;
  height: 24px;
  top: -10px;
  background: #d8c15a;
}

.enemy-sprite.model-drake .horn-left {
  left: 24px;
  transform: rotate(-28deg);
}

.enemy-sprite.model-drake .horn-right {
  right: 20px;
  transform: rotate(28deg);
}

.enemy-sprite.model-drake .tail {
  display: block;
  width: 18px;
  height: 76px;
  right: -8px;
  top: 84px;
  background: #d57b28;
  transform: rotate(-26deg);
}

.enemy-sprite.model-titan {
  width: 122px;
  height: 210px;
}

.enemy-sprite.model-titan .head {
  width: 28px;
  height: 24px;
  left: 47px;
  background: #8a7df0;
  box-shadow: 0 0 0 4px #43387c;
}

.enemy-sprite.model-titan .torso {
  width: 66px;
  height: 84px;
  left: 28px;
  background: #31255a;
  box-shadow: 0 0 0 8px #161125;
}

.enemy-sprite.model-titan .arm-left,
.enemy-sprite.model-titan .arm-right {
  width: 18px;
  height: 78px;
  top: 36px;
  background: #8a7df0;
}

.enemy-sprite.model-titan .leg-left,
.enemy-sprite.model-titan .leg-right {
  width: 20px;
  height: 82px;
  top: 104px;
  background: #40335f;
}

.enemy-sprite.model-titan .foot-left,
.enemy-sprite.model-titan .foot-right {
  width: 30px;
  height: 14px;
  top: 184px;
  background: #7567c4;
}

.enemy-sprite.model-titan .blade {
  display: none;
}

.enemy-sprite.model-titan .aura {
  display: block;
  width: 132px;
  height: 132px;
  left: -5px;
  top: 18px;
  border: 4px solid rgba(138, 125, 240, 0.42);
  border-radius: 50%;
}

#enemyName {
  font-size: 1.3rem;
  letter-spacing: 0.08em;
  color: #d8d8d8;
  margin-bottom: 10px;
}

#enemyFlavor,
#enemyStatsPanel,
#enemyAttackText,
#enemyIntentText,
#combatFeed,
#statusText {
  color: rgba(216,216,216,0.58);
}

#enemyStatsPanel {
  background: transparent;
  border: none;
  padding: 4px 0 10px;
  text-align: center;
}

#statusText,
#combatFeed {
  width: 250px;
  margin-left: auto;
  margin-right: auto;
  text-align: left;
}

.spell-book {
  margin-top: 0;
}

.spell-book h2 {
  font-size: 1rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--gold);
}

.relic-strip {
  margin-top: 18px;
  padding: 12px;
  background: linear-gradient(180deg, #24140c, #120b08);
  border: 3px solid #a56c2f;
  box-shadow: 6px 6px 0 rgba(0,0,0,0.25);
  text-align: left;
}

.relic-strip h2 {
  margin: 0 0 10px;
  font-size: 0.92rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--gold);
}

.relic-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.relic-chip {
  min-width: 58px;
  padding: 8px 10px;
  border: 3px solid #7e4a1d;
  background: #2b140b;
  color: #e8dcc8;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.22);
  text-align: center;
}

.relic-chip strong {
  display: block;
  font-size: 0.68rem;
  color: #f1d28b;
  letter-spacing: 0.08em;
}

.relic-chip span {
  display: block;
  margin-top: 4px;
  font-size: 0.58rem;
  color: rgba(232,220,200,0.76);
}

.phase-banner {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 20;
  min-width: 220px;
  padding: 12px 14px;
  background: linear-gradient(180deg, #5d220f, #2a1208);
  border: 3px solid #e0a257;
  color: #fff0d4;
  box-shadow: 8px 8px 0 rgba(0,0,0,0.28);
  text-align: left;
  opacity: 0;
  transform: translateY(-8px);
  pointer-events: none;
  transition: opacity 0.28s ease, transform 0.28s ease;
}

.phase-banner.show {
  opacity: 1;
  transform: translateY(0);
}

.phase-banner strong {
  display: block;
  font-size: 0.76rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.phase-banner span {
  display: block;
  margin-top: 5px;
  font-size: 0.65rem;
  line-height: 1.45;
  color: rgba(255,240,212,0.82);
}

.attack-banner {
  position: fixed;
  left: 50%;
  top: 90px;
  transform: translateX(-50%) translateY(-8px);
  min-width: 240px;
  padding: 10px 14px;
  background: linear-gradient(180deg, #40150f, #1f0b08);
  border: 3px solid #d07c4c;
  color: #ffe7c6;
  box-shadow: 8px 8px 0 rgba(0,0,0,0.28);
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.24s ease, transform 0.24s ease;
  z-index: 35;
}

.attack-banner.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.attack-banner strong {
  display: block;
  font-size: 0.76rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.attack-banner span {
  display: block;
  margin-top: 4px;
  font-size: 0.68rem;
  color: rgba(255,231,198,0.82);
}

.spell-grid {
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}

.overlay-panel {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(3, 6, 12, 0.82);
  z-index: 30;
  padding: 20px;
}

.overlay-panel.show {
  display: flex;
}

.overlay-card {
  width: min(860px, 100%);
  max-height: min(88vh, 860px);
  overflow: auto;
  background: linear-gradient(180deg, #24140c, #120b08);
  border: 3px solid #a56c2f;
  box-shadow: 10px 10px 0 rgba(0,0,0,0.28);
  padding: 18px;
}

.overlay-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.overlay-title {
  color: #f0d28a;
  font-size: 1rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.overlay-close {
  background: #6a3d12;
  border: 3px solid #a56c2f;
  color: #fff;
  font-family: inherit;
  padding: 8px 12px;
  cursor: pointer;
}

.card-popup-body {
  display: grid;
  grid-template-columns: minmax(240px, 300px) minmax(0, 1fr);
  gap: 14px;
  text-align: left;
  align-items: start;
}

.card-popup-art {
  min-height: 320px;
  padding: 10px;
  background: rgba(228, 212, 176, 0.12);
  border: 3px solid #7b4a1f;
  box-shadow:
    inset 0 0 0 2px rgba(237, 202, 126, 0.22),
    inset 0 -4px 0 rgba(0,0,0,0.14);
}

.card-popup-art .spell-art {
  width: 100%;
  min-height: 296px;
  height: 296px;
}

.card-popup-copy {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px;
  background: rgba(32, 15, 5, 0.76);
  border: 3px solid #7b3c10;
  min-height: 320px;
  min-width: 0;
}

.card-popup-copy .selected-card-rules {
  line-height: 1.6;
  word-break: break-word;
  display: block;
}

.compact-relics .relic-row {
  margin-top: 4px;
}

.compact-relics .relic-chip {
  min-width: 48px;
  padding: 6px 8px;
}

.spell-button {
  min-height: 190px;
  background:
    linear-gradient(180deg, #b99352 0%, #90652f 8%, #24140c 8%, #120b08 100%);
  border: 3px solid #a56c2f;
  box-shadow: 6px 6px 0 rgba(0,0,0,0.25);
}

.spell-button.rank-3,
.selected-card-shell.rank-3 {
  box-shadow: 0 0 0 2px rgba(137, 205, 255, 0.18), 6px 6px 0 rgba(0,0,0,0.25);
  border-color: #8cc8ff;
}

.spell-button.rank-5,
.selected-card-shell.rank-5 {
  box-shadow: 0 0 0 2px rgba(255, 212, 116, 0.25), 0 0 18px rgba(255, 185, 75, 0.18), 6px 6px 0 rgba(0,0,0,0.25);
  border-color: #f0c96a;
}

.spell-button.selected {
  border-color: #e8c96a;
  box-shadow: 0 0 0 2px rgba(232,201,106,0.18), 6px 6px 0 rgba(0,0,0,0.25);
}

.card-rarity {
  color: #f0d28a;
}

.card-title {
  color: #f1efe8;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.level-requirement {
  display: inline-block;
  margin: 4px 0 8px;
  padding: 4px 8px;
  border-radius: 999px;
  background: rgba(232, 201, 106, 0.18);
  border: 1px solid rgba(232, 201, 106, 0.45);
  color: #f6d98d;
  font-size: 0.78rem;
  font-weight: bold;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.card-meta {
  color: rgba(233,242,255,0.74);
}

.reward-panel,
.tutorial-card {
  border-radius: 0;
  background: linear-gradient(180deg, #24140c, #120b08);
  border: 3px solid #a56c2f;
  color: #e9f2ff;
}

.tutorial-title,
.tutorial-body,
.tutorial-points,
.tutorial-step {
  color: #e9f2ff;
}

.tutorial-primary,
.tutorial-secondary {
  border-radius: 0;
  font-family: inherit;
}

@media (max-width: 980px) {
  .game-area {
    grid-template-columns: 1fr;
  }

  .card-popup-body {
    grid-template-columns: 1fr;
  }

  .card-popup-art,
  .card-popup-copy {
    min-height: 0;
  }

  #enemyPanel,
  #playerPanel {
    justify-self: center;
  }

  #levelButtons {
    position: static;
    margin-top: 14px;
  }

  .screen {
    padding-bottom: 40px;
  }
}

@keyframes panelShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  50% { transform: translateX(4px); }
  75% { transform: translateX(-3px); }
}

@keyframes critFlash {
  0% { box-shadow: 0 0 0 rgba(250, 204, 21, 0); }
  40% { box-shadow: 0 0 22px rgba(250, 204, 21, 0.95); }
  100% { box-shadow: 0 0 0 rgba(250, 204, 21, 0); }
}

@keyframes floatFade {
  0% { opacity: 0; transform: translate(-50%, 10px); }
  18% { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -24px); }
}

@keyframes spriteJolt {
  0%, 100% { transform: translateX(-50%); }
  50% { transform: translateX(-50%) translateY(-4px); }
}

@keyframes spriteLunge {
  0%, 100% { transform: translateX(-50%); }
  50% { transform: translateX(-42%) translateY(-1px); }
}

@keyframes pixelPulse {
  0% { opacity: 0; }
  40% { opacity: 1; }
  100% { opacity: 0; }
}

@keyframes bossPulse {
  0% { box-shadow: 0 0 0 rgba(255, 116, 72, 0); }
  45% { box-shadow: 0 0 28px rgba(255, 116, 72, 0.75); }
  100% { box-shadow: 0 0 0 rgba(255, 116, 72, 0); }
}
</style>
</head>
<body>
<div class="screen">
  <h1>Areen</h1>
  <p class="subtitle">
     </p>
  <div class="top-bar">
    <button class="settings-toggle" type="button" id="settingsToggle" onclick="toggleSettings()">Open Settings</button>
    <button class="settings-toggle" type="button" id="collectionToggle" onclick="toggleCollection()">Open Cards & Relics</button>
    <button class="settings-toggle" type="button" id="devToggle" onclick="toggleDevPanel()" hidden aria-hidden="true">Open Dev</button>
    <button class="settings-toggle pause-toggle" type="button" id="pauseToggle" onclick="togglePauseMenu()">Menu</button>
    <button class="settings-toggle" type="button" onclick="openTutorial(true)">How To Play</button>
  </div>
  <section class="settings-panel" id="settingsPanel">
      <div class="settings-title">Settings</div>
      <div class="settings-grid">
        <div class="settings-group">
          <div class="settings-label">Challenge Level</div>
          <div class="settings-note">Use the `1-5` level buttons above the math prompt to choose your challenge.</div>
        </div>
      </div>
  </section>

  <section class="collection-panel" id="collectionPanel">
    <div class="settings-title">Cards & Relics</div>
    <div class="settings-grid">
      <div class="settings-group">
        <div class="settings-label">Cards</div>
        <div class="settings-actions">
          <button type="button" onclick="openSpellbookPopup()">Spellbook</button>
          <button type="button" onclick="openCardPopup()">Card Details</button>
        </div>
        <div class="settings-note">Open your full spellbook or inspect the currently drawn card.</div>
      </div>
      <div class="settings-group compact-relics">
        <div class="settings-label">Relics</div>
        <div class="relic-row" id="relicRow">
          <div class="relic-chip"><strong>None</strong><span>No relics yet</span></div>
        </div>
      </div>
    </div>
  </section>

  <section class="dev-panel" id="devPanel">
    <div class="settings-title">Dev Controls</div>
    <div class="settings-grid">
      <div class="settings-group">
        <div class="settings-label">Round Skips</div>
        <div class="settings-actions">
          <button type="button" onclick="devAdvanceBattles(1)">Skip 1 Round</button>
          <button type="button" onclick="devAdvanceBattles(5)">Skip 5 Rounds</button>
          <button type="button" onclick="devJumpToBoss()">Next Boss</button>
        </div>
        <div class="settings-note">Use this hidden panel to jump ahead without opening reward or boss screens by hand.</div>
      </div>
      <div class="settings-group">
        <div class="settings-label">Safety Tools</div>
        <div class="settings-actions">
          <button type="button" onclick="devHealFull()">Heal Full</button>
          <button type="button" onclick="devRerollEnemy()">Reroll Enemy</button>
        </div>
        <div class="settings-note">Quick recovery and enemy refresh tools for testing later fights faster.</div>
      </div>
    </div>
  </section>

  <div class="game-area">
    <div class="panel" id="playerPanel">
      <h2>Mage</h2>
      <h3 id="activeSpellName" class="ui-hidden">Choose a spell</h3>
      <div class="card-container">
        <div class="floating-layer" id="playerFloaters"></div>
        <div class="card" id="playerCard">
          <div class="card-face front">
            <div class="selected-card-shell">
              <div class="selected-card-art" id="selectedCardArt" aria-hidden="true"></div>
              <div class="selected-card-copy">
                <div class="selected-card-tag" id="selectedCardTag">Arcane Draft</div>
                <div class="selected-card-name" id="selectedCardName">Choose a spell</div>
                <div class="selected-card-text" id="selectedCardText">Choose a spell to reveal its art and purpose.</div>
                <div class="selected-card-rules" id="selectedCardRules">Its combat identity and permanent bonuses will appear here.</div>
              </div>
            </div>
          </div>
          <div class="card-face back"></div>
        </div>
      </div>
      <button class="card-popup-trigger" type="button" onclick="openCardPopup()">Card Details</button>
      <div class="health-bar"><div class="health-fill" id="playerHealth"></div></div>
      <div id="playerHPText">HP: 180 / 180</div>
      <button class="stats-toggle" type="button" onclick="toggleStats('player')">Player Stats</button>
      <div class="stats-wrap" id="playerStatsWrap">
        <div class="stat-list" id="playerStatsPanel"></div>
      </div>

      <div class="info">
        Level: <span id="level">-</span><br>
        Battle: <span id="battleCount">1</span>
      </div>
      <div class="turn-order" id="turnOrder">Your Turn -> Solve and cast</div>
      <p class="status" id="statusText">Solve the math and cast.</p>
      <div class="combat-feed" id="combatFeed">The duel is ready.</div>
      <div class="game-log">
        <div class="game-log-head">
          <div class="game-log-title">Game Log</div>
          <div class="game-log-nav">
            <button type="button" onclick="stepGameLog(-1)"><</button>
            <button type="button" onclick="stepGameLog(1)">></button>
          </div>
        </div>
        <div class="game-log-list" id="gameLog">
          <div class="game-log-entry">The duel is ready.</div>
        </div>
      </div>
      <div class="ui-hidden">
        <span id="score">0</span>
        <span id="cardsEarned">1</span>
      </div>
    </div>

    <div class="panel duel-panel" id="duelPanel">
      <div class="duel-stack">
        <div class="buttons" id="levelButtons">
          <button onclick="chooseLevel(1)">1</button>
          <button onclick="chooseLevel(2)">2</button>
          <button onclick="chooseLevel(3)">3</button>
          <button onclick="chooseLevel(4)">4</button>
          <button onclick="chooseLevel(5)">5</button>
        </div>
        <div id="question" class="question">Pick a level and a spell card</div>
        <div class="stance-readout ui-hidden" id="questionTwist">Ritual Twist: None</div>
        <div class="stance-row">
          <button class="stance-button selected" id="stance-burst" type="button" onclick="selectStance('burst')">
            <strong>Burst</strong>
            <span>More damage and crit, but backlash hits harder.</span>
          </button>
          <button class="stance-button" id="stance-guard" type="button" onclick="selectStance('guard')">
            <strong>Guard</strong>
            <span>Lower damage, gain barrier, and soften enemy hits.</span>
          </button>
          <button class="stance-button" id="stance-siphon" type="button" onclick="selectStance('siphon')">
            <strong>Siphon</strong>
            <span>Trade burst for healing, focus, and safer recovery.</span>
          </button>
        </div>
        <div class="stance-readout" id="stanceReadout">Ritual Stance: Burst | Combo 0</div>
        <input id="answer" type="number" placeholder="Answer">
        <button class="cast-button" id="castSpellButton" onclick="submitAnswer()">Cast Spell</button>
        <button class="cast-button" onclick="toggleHint()">Hint / Steps</button>
        <p class="hint ui-hidden">Selected spell damage: <span id="spellDamage">0</span></p>
        <div class="stat-list" id="hintPanel" style="display: none; margin-top: 10px;"></div>
      </div>
    </div>

    <div class="panel battle-panel" id="enemyPanel">
      <h2>Dark Foe</h2>
      <h3 id="enemyName">Goblin Scout</h3>
      <div class="enemy-stage">
        <div class="floating-layer" id="enemyFloaters"></div>
        <div class="enemy-shadow"></div>
        <div class="enemy-sprite">
          <div class="part aura"></div>
          <div class="part horn-left"></div>
          <div class="part horn-right"></div>
          <div class="part head"></div>
          <div class="part cloak"></div>
          <div class="part torso"></div>
          <div class="part arm-left"></div>
          <div class="part arm-right"></div>
          <div class="part blade"></div>
          <div class="part leg-left"></div>
          <div class="part leg-right"></div>
          <div class="part tail"></div>
          <div class="part foot-left"></div>
          <div class="part foot-right"></div>
        </div>
      </div>
      <div class="card-face enemy-card" style="position: relative; inset: auto;">
        <p id="enemyFlavor">A sneaky foe blocks your path.</p>
      </div>
      <button class="stats-toggle" type="button" onclick="toggleStats('enemy')">Enemy Stats</button>
      <div class="stats-wrap" id="enemyStatsWrap">
        <div class="stat-list" id="enemyStatsPanel"></div>
      </div>
      <div class="health-bar"><div class="health-fill" id="enemyHealth"></div></div>
      <div id="enemyHPText">HP: 150 / 150</div>
      <div id="enemyIntentChip" class="intent-chip attack">Attack</div>
      <div id="enemyIntentText" class="hint">Intent: Testing strike</div>
      <div id="enemyAttackText" class="hint ui-hidden">Enemy attack: 10</div>
    </div>
  </div>

  <section class="reward-panel" id="rewardPanel">
    <h2>Choose Your Reward</h2>
    <p class="hint">Choose an enchanted card or occasional potion. Its blessings are added to your mage immediately.</p>
    <div class="reward-grid" id="rewardGrid"></div>
  </section>

  <section class="reward-panel" id="deathPanel">
    <h2>Choose A Death Blessing</h2>
    <p class="hint">Defeat has forged your mage. Choose how your next run grows stronger.</p>
    <div class="reward-grid" id="deathGrid"></div>
  </section>

  <section class="reward-panel" id="milestonePanel">
    <h2>Choose A Milestone Boon</h2>
    <p class="hint">A rare pause in the climb. Pick one lasting edge for the next stretch.</p>
    <div class="reward-grid" id="milestoneGrid"></div>
  </section>

  <section class="reward-panel" id="relicPanel">
    <h2>Choose A Relic</h2>
    <p class="hint">Bosses and hidden chambers can uncover artifacts that permanently reshape the run.</p>
    <div class="reward-grid" id="relicGrid"></div>
  </section>
</div>

<div class="tutorial-overlay" id="tutorialOverlay">
  <div class="tutorial-card">
    <div class="tutorial-step" id="tutorialStepLabel">Step 1 of 3</div>
    <div class="tutorial-title" id="tutorialTitle">Welcome to the duel</div>
    <div class="tutorial-body" id="tutorialBody"></div>
    <ul class="tutorial-points" id="tutorialPoints"></ul>
    <div class="tutorial-actions">
      <button class="tutorial-secondary" type="button" id="tutorialSkip">Skip</button>
      <button class="tutorial-primary" type="button" id="tutorialNext">Next</button>
    </div>
  </div>
</div>

<div class="phase-banner" id="phaseBanner">
  <strong id="phaseBannerTitle">Phase Shift</strong>
  <span id="phaseBannerText">A new threat is building.</span>
</div>

<div class="attack-banner" id="attackBanner">
  <strong id="attackBannerTitle">Enemy Attack</strong>
  <span id="attackBannerText">The foe is about to strike.</span>
</div>

<div class="pause-panel" id="pausePanel">
  <div class="pause-card">
    <h2>Pause Menu</h2>
    <p class="hint">Take a breath, review the game, or restart this run.</p>
    <div class="pause-actions">
      <button type="button" onclick="togglePauseMenu()">Resume</button>
      <button type="button" onclick="openTutorial(true); togglePauseMenu(false);">How To Play</button>
      <button type="button" onclick="togglePauseMenu(false); resetRun();">Restart Run</button>
    </div>
  </div>
</div>

<div class="overlay-panel" id="spellbookPopup">
  <div class="overlay-card">
    <div class="overlay-head">
      <div class="overlay-title">Spellbook</div>
      <button class="overlay-close" type="button" onclick="closeSpellbookPopup()">Close</button>
    </div>
    <p class="hint">Each card adds permanent bonuses to the run. In combat, a random playable card is drawn from your owned spellbook each cast.</p>
    <div class="spell-grid" id="spellGrid"></div>
  </div>
</div>

<div class="overlay-panel" id="cardPopup">
  <div class="overlay-card">
    <div class="overlay-head">
      <div class="overlay-title" id="cardPopupTitle">Card</div>
      <button class="overlay-close" type="button" onclick="closeCardPopup()">Close</button>
    </div>
    <div class="card-popup-body">
      <div id="cardPopupArt" class="card-popup-art"></div>
      <div class="card-popup-copy">
        <div class="selected-card-tag" id="cardPopupTag">Arcane Draft</div>
        <div class="selected-card-name" id="cardPopupName">Choose a spell</div>
        <div class="selected-card-text" id="cardPopupText">Card details will appear here.</div>
        <div class="selected-card-rules" id="cardPopupRules">Rules text will appear here.</div>
      </div>
    </div>
  </div>
</div>

<script>

];

const enemyRoster = [

function getSpellById(id) {
  return spellPool.find((spell) => spell.id === id);
}

function getCurrentSpell() {
  return getSpellById(currentSpellId) || spellPool[0];
}

function getPlayableSpellIds() {
  const owned = getOwnedSpellIds();
  if (!level) return owned;
  const playable = owned.filter((id) => getScaledSpellStats(getSpellById(id)).minLevel <= level);
  return playable.length > 0 ? playable : owned;
}

function drawCombatSpell() {
  const pool = getPlayableSpellIds();
  if (pool.length === 0) return;
  currentSpellId = pool[rand(0, pool.length - 1)];
}

function getOwnedSpellIds() {
  return Object.keys(spellLevels);
}

function getSpellLevel(id) {
  return spellLevels[id] || 0;
}

function getSpellEvolution(spell) {
  const level = getSpellLevel(spell.id);
  if (level >= 5) {
    return {
      title: `Ascended ${spell.name}`,
      text: `${spell.text} Its fully awakened form now carries a much heavier battlefield signature.`,
      power: 2,
      ward: 1,
      focus: 1,
      crit: 3,
      lifesteal: 2,
      baseDamage: 3,
      vitality: 5
    };
  }

  if (level >= 3) {
    return {
      title: `Awakened ${spell.name}`,
      text: `${spell.text} The card has evolved and its magic now flows with a deeper edge.`,
      power: 1,
      ward: 0,
      focus: 1,
      crit: 1,
      lifesteal: 1,
      baseDamage: 2,
      vitality: 2
    };
  }

  return null;
}

function getScaledSpellStats(spell) {
  const spellLevel = Math.max(1, getSpellLevel(spell.id));
  const upgradeBonus = spellLevel - 1;
  const evolution = getSpellEvolution(spell);

  return {
    ...spell,
    name: evolution ? evolution.title : spell.name,
    text: evolution ? evolution.text : spell.text,
    spellLevel,
    evolutionTier: evolution ? (spellLevel >= 5 ? 2 : 1) : 0,
    baseDamage: spell.baseDamage + upgradeBonus * 2 + (evolution?.baseDamage || 0),
    crit: spell.crit + upgradeBonus + (evolution?.crit || 0) + relicBonuses.crit,
    power: spell.power + upgradeBonus + (evolution?.power || 0),
    ward: spell.ward + Math.floor(upgradeBonus / 2) + (evolution?.ward || 0),
    focus: spell.focus + Math.floor(upgradeBonus / 2) + (evolution?.focus || 0),
    vitality: spell.vitality + upgradeBonus * 3 + (evolution?.vitality || 0),
    lifesteal: spell.lifesteal + Math.floor(upgradeBonus / 2) + (evolution?.lifesteal || 0)
  };
}

function getSharedSpellStats(spell) {
  return {
    health: spell.vitality,
    attack: spell.baseDamage + spell.power,
    armor: spell.ward,
    crit: spell.crit,
    heal: spell.lifesteal,
    fury: 1,
    thorns: 0
  };
}

function getPlayerStats() {
  const stats = { power: 0, ward: 0, focus: 0, vitality: 0, lifesteal: 0 };

  getOwnedSpellIds().forEach((id) => {
    const spell = getScaledSpellStats(getSpellById(id));
    stats.power += spell.power;
    stats.ward += spell.ward;
    stats.focus += spell.focus;
    stats.vitality += spell.vitality;
    stats.lifesteal += spell.lifesteal;
  });

  stats.power += potionBonuses.power;
  stats.ward += potionBonuses.ward;
  stats.focus += potionBonuses.focus;
  stats.vitality += potionBonuses.vitality;
  stats.lifesteal += potionBonuses.lifesteal;

  stats.power += deathBlessings.power;
  stats.ward += deathBlessings.ward;
  stats.focus += deathBlessings.focus;
  stats.vitality += deathBlessings.vitality;
  stats.lifesteal += deathBlessings.lifesteal;

  stats.power += relicBonuses.power;
  stats.ward += relicBonuses.ward;
  stats.focus += relicBonuses.focus;
  stats.vitality += relicBonuses.vitality;
  stats.lifesteal += relicBonuses.lifesteal;

  return stats;
}

function getSharedPlayerStats() {
  const stats = getPlayerStats();

  return {

    armor: stats.ward + playerBarrier,
    crit: spell.crit,
    heal: stats.lifesteal,
    fury: 1,
    thorns: 0
  };
}

function getSharedEnemyStats() {

  return {

    fury: 1,

  };
}

function formatSharedStatsInline(stats, options = {}) {
  const valuePrefix = options.valuePrefix || "";
  const critSuffix = options.critSuffix || "";
  const recoverySuffix = options.recoverySuffix || options.healSuffix || "";
  return [
    `Health ${valuePrefix}${stats.health}`,
    `Attack ${valuePrefix}${stats.attack}`,
    `Armor ${valuePrefix}${stats.armor}`,
    `Crit ${valuePrefix}${stats.crit}${critSuffix}`,
    `Recovery ${valuePrefix}${stats.heal}${recoverySuffix}`,
    `Speed ${valuePrefix}${stats.fury}`,
    `Thorns ${valuePrefix}${stats.thorns || 0}`
  ].join(" | ");
}

function getBattleCardText(text) {
  if (!text) return "";
  const parts = text.split(".");
  return parts[0].trim() + (parts[0] ? "." : "");

function recalculatePlayerTotals(preserveRatio = true) {
  const oldMax = maxPlayerHP;
  const ratio = oldMax > 0 ? playerHP / oldMax : 1;
  const stats = getPlayerStats();
  maxPlayerHP = basePlayerMaxHP + stats.vitality;
  playerHP = preserveRatio ? Math.round(maxPlayerHP * ratio) : Math.min(playerHP, maxPlayerHP);
  if (playerHP > maxPlayerHP) playerHP = maxPlayerHP;
}

function renderGameLog() {
  const log = document.getElementById("gameLog");
  if (!log) return;
  const perPage = 3;
  const maxPage = Math.max(0, Math.ceil(gameLogEntries.length / perPage) - 1);
  gameLogPage = Math.max(0, Math.min(gameLogPage, maxPage));
  const start = gameLogPage * perPage;
  const visible = gameLogEntries.slice(start, start + perPage);
  log.innerHTML = visible.map((entry) => `<div class="game-log-entry">${entry}</div>`).join("");
}

function pushGameLog(message) {
  if (!message) return;
  gameLogEntries = [message, ...gameLogEntries.filter((entry) => entry !== message)].slice(0, 5);
  gameLogPage = 0;
  renderGameLog();
}

function stepGameLog(direction) {
  const perPage = 3;
  const maxPage = Math.max(0, Math.ceil(gameLogEntries.length / perPage) - 1);
  gameLogPage = Math.max(0, Math.min(maxPage, gameLogPage + direction));
  renderGameLog();
}

}

function playRetroTone(type) {
  const ctx = getAudioContext();
  if (!ctx) return;
  if (ctx.state === "suspended") {
    ctx.resume().catch(() => {});
  }

  const config = {
    hit: { freq: 240, end: 180, duration: 0.08, gain: 0.035, wave: "square" },
    heal: { freq: 420, end: 560, duration: 0.1, gain: 0.028, wave: "triangle" },
    miss: { freq: 170, end: 110, duration: 0.12, gain: 0.035, wave: "sawtooth" },
    phase: { freq: 260, end: 420, duration: 0.16, gain: 0.04, wave: "square" },
    boss: { freq: 140, end: 260, duration: 0.22, gain: 0.05, wave: "square" }
  }[type];

  if (!config) return;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const now = ctx.currentTime;
  osc.type = config.wave;
  osc.frequency.setValueAtTime(config.freq, now);
  osc.frequency.linearRampToValueAtTime(config.end, now + config.duration);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(config.gain, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + config.duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + config.duration + 0.02);
}

  if (!panel || !button) return;
  const opening = !panel.classList.contains("open");
  panel.classList.toggle("open", opening);
  button.innerText = opening ? "Hide Cards & Relics" : "Open Cards & Relics";
}

function setDevPanelOpen(opening, revealButton = false) {
  const panel = document.getElementById("devPanel");
  const button = document.getElementById("devToggle");
  if (!panel || !button) return;
  panel.classList.toggle("open", opening);
  button.hidden = !revealButton && !opening;
  button.setAttribute("aria-hidden", button.hidden ? "true" : "false");
  button.innerText = opening ? "Close Dev" : "Open Dev";
}

function toggleDevPanel() {
  if (!devShortcutUnlocked) return;
  const panel = document.getElementById("devPanel");
  if (!panel) return;
  const opening = !panel.classList.contains("open");
  setDevPanelOpen(opening, opening);
  if (!opening) {
    devShortcutUnlocked = false;
  }
}

function handleDevShortcut(event) {
  if (embedMode || event.key !== "Backspace" || event.repeat) {
    return;
  }

  const target = event.target;
  if (
    target instanceof HTMLInputElement ||
    target instanceof HTMLTextAreaElement ||
    target instanceof HTMLSelectElement ||
    target?.isContentEditable
  ) {
    return;
  }

  const now = Date.now();
  devShortcutPresses = devShortcutPresses.filter((timestamp) => now - timestamp <= 1400);
  devShortcutPresses.push(now);

  if (devShortcutPresses.length < 5) {
    return;
  }

  devShortcutPresses = [];
  devShortcutUnlocked = true;
  setDevPanelOpen(true, true);
  setStatus("Dev panel unlocked.");
  setCombatFeed("Hidden dev shortcut accepted.");
}

function closeProgressPanels() {
  ["rewardPanel", "relicPanel", "milestonePanel", "deathPanel"].forEach((id) => {
    const panel = document.getElementById(id);
    if (panel) {
      panel.classList.remove("show");
    }
  });
}

function devAdvanceBattles(amount) {
  if (embedMode) return;
  closeProgressPanels();
  battleCount = Math.max(1, battleCount + amount);
  loadNextEnemy();
  generateQuestion();
  updateHealthBars();
  setStatus(`Dev skip: advanced ${amount} round${amount === 1 ? "" : "s"} to battle ${battleCount}.`);
  setCombatFeed("Dev panel advanced the run.");
}

function devJumpToBoss() {
  if (embedMode) return;
  closeProgressPanels();
  if (battleCount % 5 !== 0) {
    battleCount += 5 - (battleCount % 5);
  }
  loadNextEnemy();
  generateQuestion();
  updateHealthBars();
  setStatus(`Dev jump: battle ${battleCount} is now loaded.`);
  setCombatFeed("Boss jump engaged from the dev panel.");
}

function devHealFull() {
  playerHP = maxPlayerHP;
  updateHealthBars();
  setStatus("Dev heal: HP restored to full.");
  setCombatFeed("Your testing run is back at full strength.");
}

function devRerollEnemy() {
  if (embedMode) return;
  closeProgressPanels();
  battleCount += 1;
  loadNextEnemy();
  generateQuestion();
  updateHealthBars();
  setStatus(`Dev reroll: new enemy loaded for battle ${battleCount}.`);
  setCombatFeed("Enemy lineup rerolled from the dev panel.");
}

function pulsePanel(id, className) {
  const panel = document.getElementById(id);
  if (!panel) return;
  panel.classList.remove(className);
  void panel.offsetWidth;
  panel.classList.add(className);
  setTimeout(() => panel.classList.remove(className), 420);
}

function animateElementClass(selector, className, duration = 260) {
  const element = typeof selector === "string" ? document.querySelector(selector) : selector;
  if (!element) return;
  element.classList.remove(className);
  void element.offsetWidth;
  element.classList.add(className);
  setTimeout(() => element.classList.remove(className), duration);
}

function showFloatingText(layerId, text, type = "damage") {
  const layer = document.getElementById(layerId);
  if (!layer) return;
  const node = document.createElement("div");
  node.className = `floating-text ${type}`;
  node.textContent = text;
  node.style.left = `${rand(38, 62)}%`;
  node.style.top = type === "phase" ? "30%" : `${rand(42, 62)}%`;
  layer.appendChild(node);
  setTimeout(() => node.remove(), 1400);
}

function getEnemyPhaseLabel(enemy) {
  return enemy.phase >= 3 ? "Final Phase" : enemy.phase === 2 ? "Phase Two" : "Opening Phase";
}

function maybeAdvanceEnemyPhase() {
  if (!currentEnemy || currentEnemy.phase >= 3) return false;
  const hpRatio = enemyHP / Math.max(1, maxEnemyHP);
  let changed = false;
  let bannerText = "";

  if (currentEnemy.phase === 1 && hpRatio <= 0.6) {
    currentEnemy.phase = 2;
    currentEnemy.attack += 2;
    currentEnemy.fury += 1;
    currentEnemy.bonusText = `${currentEnemy.baseBonusText} Phase two: ${currentEnemy.phaseTwoText}`;
    changed = true;
    bannerText = `${currentEnemy.name} entered phase two. ${currentEnemy.phaseTwoText}`;
  } else if (currentEnemy.phase === 2 && hpRatio <= 0.28) {
    currentEnemy.phase = 3;
    currentEnemy.attack += 3;
    currentEnemy.armor += 1;
    currentEnemy.thorns += currentEnemy.name === "Ash Drake" ? 1 : 0;
    currentEnemy.bonusText = `${currentEnemy.baseBonusText} Final phase: ${currentEnemy.phaseThreeText}`;
    changed = true;
    bannerText = `${currentEnemy.name} entered final phase. ${currentEnemy.phaseThreeText}`;
  }

  if (changed) {
    animateElementClass(".enemy-stage", "phase-flash", 420);
    showFloatingText("enemyFloaters", getEnemyPhaseLabel(currentEnemy), "phase");
    showPhaseBanner(getEnemyPhaseLabel(currentEnemy), bannerText, currentEnemy.isBoss ? "boss" : "phase");
    setCombatFeed(`${currentEnemy.name} shifts into ${getEnemyPhaseLabel(currentEnemy).toLowerCase()}.`);
    nextEnemyMove = planEnemyMove();
    document.getElementById("enemyIntentText").innerText = getEnemyIntentText();
    renderEnemyStats();
  }

  return changed;
}

function calculateDamage(runeResult = null) {
  const spell = getScaledSpellStats(getCurrentSpell());
  const stats = getPlayerStats();
  const stance = getStanceConfig();
  const comboBonus = Math.min(comboStreak * 2, 12) + relicBonuses.combo;
  const base = level * 10 + spell.baseDamage + stats.power + stance.damageBonus + comboBonus;
  let bonusDamage = 0;
  let armorPierce = 0;
  let extraLifesteal = 0;
  let barrierGain = relicBonuses.barrier;
  let weakenGain = enemyStatus.chill;
  let critBonus = relicBonuses.crit + (runeResult?.critBonus || 0);

  if (spell.id === "spark") {
    bonusDamage += Math.max(1, 5 - level);
  } else if (spell.id === "ember") {
    bonusDamage += level >= 3 ? 5 : 2;
  } else if (spell.id === "moss") {
    barrierGain += 5 + Math.floor(spell.spellLevel / 2);
    extraLifesteal += 5;
  } else if (spell.id === "frost") {
    weakenGain += 3 + Math.floor(spell.spellLevel / 2);
  } else if (spell.id === "storm") {
    critBonus += level >= 3 ? 12 : 5;
  } else if (spell.id === "prism") {
    extraLifesteal += 8;
  } else if (spell.id === "nova") {
    armorPierce += 2 + Math.floor(level / 2);
    bonusDamage += level;
  } else if (spell.id === "aegis") {
    barrierGain += 9 + spell.spellLevel;
  } else if (spell.id === "void") {
    extraLifesteal += 10;
    critBonus += 4;
  } else if (spell.id === "meteor") {
    bonusDamage += Math.round((enemyHP / Math.max(1, maxEnemyHP)) * 8);
  } else if (spell.id === "oracle") {
    critBonus += 8;
    extraLifesteal += 4;
  }

  if (currentTwist?.id === "greedy") {
    bonusDamage += 5;
  } else if (currentTwist?.id === "steady") {
    barrierGain += 4;
  } else if (currentTwist?.id === "surge" && questionMisses === 0) {
    critBonus += 6;
  }

  barrierGain += stance.barrierGain;
  extraLifesteal += stance.extraLifesteal;
  critBonus += stance.critBonus;

  const critChance = spell.crit + stats.focus * 2 + critBonus;
  const crit = rand(1, 100) <= critChance;
  const critMultiplier = crit ? 1.5 : 1;
  const rawDamage = Math.round((base + bonusDamage + (runeResult?.damageBonus || 0)) * critMultiplier);
  const finalDamage = Math.max(1, rawDamage - Math.max(0, currentEnemy.armor - armorPierce));
  return {
    value: finalDamage,
    crit,
    extraLifesteal,
    barrierGain,
    weakenGain,
    armorPierce,
    comboBonus,
    stanceName: stance.name,
    reflectScale: stance.reflectScale,
    wardBonus: stance.wardBonus,
    runeResult
  };
}

function calculateEnemyAttack() {
  const stats = getPlayerStats();
  const stance = getStanceConfig();
  const move = nextEnemyMove || planEnemyMove();
  let raw = move.damage + rand(0, move.swing);
  raw += 2;
  if (enemyTurnCount >= 3) {
    raw += Math.min(6, Math.floor(enemyTurnCount / 2) + 1);
  }
  if (currentEnemy.phase >= 2) {
    raw += 2;
  }
  raw = Math.max(1, raw - enemyWeaken - enemyStatus.chill);
  let reduced = Math.max(0, raw - stats.ward - stance.wardBonus - playerBarrier);
  const blocked = raw - reduced;
  return { damage: reduced, blocked, move };
}

function getAllowedRarities() {
  if (battleCount >= 8) return ["Common", "Rare", "Epic", "Legendary"];
  if (battleCount >= 5) return ["Common", "Rare", "Epic"];
  if (battleCount >= 2) return ["Common", "Rare"];
  return ["Common"];
}

function getEnemyIntentText() {
  if (nextEnemyMove?.label === "Ambush rush") return "Intent: Ambush rush | Fast opening burst";
  if (nextEnemyMove?.label === "Iron march") return "Intent: Iron march | Attack and armor up";
  if (nextEnemyMove?.label === "Bog omen") return "Intent: Bog omen | Curse incoming";
  if (nextEnemyMove?.label === "Cinder wake") return "Intent: Cinder wake | Thorns rising";
  if (nextEnemyMove?.label === "Ink bind") return "Intent: Ink bind | Curse and strip weaken";
  if (nextEnemyMove?.label === "Rooted stance") return "Intent: Rooted stance | Armor and thorns up";
  if (nextEnemyMove?.label === "Boss Cataclysm") return "Intent: Boss Cataclysm | Warning: huge hit and status pressure";
  if (nextEnemyMove?.label === "Boss Guardbreak") return "Intent: Boss Guardbreak | Warning: barrier break incoming";
  if (nextEnemyMove) return `Intent: ${nextEnemyMove.label} | ${currentEnemy.isBoss ? "Boss" : getEnemyPhaseLabel(currentEnemy)}`;
  if (currentEnemy.phaseText) return `Intent: ${currentEnemy.phaseText}`;
  if (currentEnemy.thorns >= 2) return "Intent: Thorned retaliation";
  if (currentEnemy.fury >= 2) return "Intent: Wild burst";
  if (currentEnemy.armor >= 3) return "Intent: Heavy guard";
  return "Intent: Pressing attack";
}

function updateTurnOrder(text = "Your Turn -> Solve and cast") {
  const node = document.getElementById("turnOrder");
  if (node) node.innerText = text;
}

function setTurnInteractionLocked(locked, statusMessage = "") {
  turnLocked = locked;
  const answer = document.getElementById("answer");
  const castButton = document.getElementById("castSpellButton");
  if (answer) answer.disabled = locked;
  if (castButton) castButton.disabled = locked;
  if (locked && statusMessage) {
    setStatus(statusMessage);
  }
}

function runEnemyAttackPhase(counterAttack, priorText, answeredCorrectly, stance) {
  updateTurnOrder(`Enemy Phase -> ${counterAttack.move.label}`);
  setTurnInteractionLocked(true, `Enemy phase: ${counterAttack.move.label}`);
  setCombatFeed(`${currentEnemy.name} gathers strength for ${counterAttack.move.label}.`);
  showAttackBanner("Enemy Phase", `${counterAttack.move.label} is coming.`);

  setTimeout(() => {
    playerHP -= Math.max(0, counterAttack.damage - (currentEnemy.isBoss ? relicBonuses.bossWard : 0));
    playerBarrier = Math.max(0, playerBarrier - counterAttack.blocked);
    enemyWeaken = 0;
    enemyStatus.chill = Math.max(0, enemyStatus.chill - 1);
    enemyTurnCount += 1;
    animateElementClass(".enemy-sprite", "attack", 560);
    if (counterAttack.damage > 0) {
      showFloatingText("playerFloaters", `-${counterAttack.damage}`, "damage");
      playRetroTone("miss");
    }
    if (counterAttack.blocked > 0) {
      showFloatingText("playerFloaters", `Block ${counterAttack.blocked}`, "buff");
    }
    counterAttack.move.apply();
    clampHealth();
    updateHealthBars();
    if (counterAttack.damage > 0) {
      pulsePanel("playerPanel", "hit-panel");
    }
    if ((currentEnemy.fury >= 3 || currentEnemy.isBoss) && enemyTurnCount >= 2 && playerHP > 0) {
      const followUpDamage = Math.max(1, Math.round(Math.max(1, enemyAttack - getPlayerStats().ward) * 0.45));
      playerHP -= followUpDamage;
      showFloatingText("playerFloaters", `-${followUpDamage}`, "damage");
      priorText += ` Follow-up strike hits for ${followUpDamage}.`;
      clampHealth();
      updateHealthBars();
    }
    setCombatFeed(
      counterAttack.blocked > 0
        ? `${counterAttack.move.label} slams in, but your barrier blocks ${counterAttack.blocked}.`
        : `${counterAttack.move.label} connects. ${stance.name} stance holds the line.`
    );
    nextEnemyMove = planEnemyMove();
    document.getElementById("enemyIntentText").innerText = getEnemyIntentText();
    updateIntentChip();
    if (currentEnemy.isBoss && (nextEnemyMove.label === "Boss Cataclysm" || nextEnemyMove.label === "Boss Guardbreak")) {
      pulseBossWarning();
      showPhaseBanner("Boss Warning", `${currentEnemy.name} is preparing ${nextEnemyMove.label}.`, "boss");
    }
    renderEnemyStats();

    if (playerHP === 0) {
      setTimeout(() => {
        handleDefeat();
      }, 240);
      return;
    }

    setTimeout(() => {
      resetCard(answeredCorrectly);
      setTurnInteractionLocked(false);
      if (answeredCorrectly) {
        generateQuestion();
      } else {
        updateHintPanel();
      }
    }, 700);
  }, 900);
}

function updateEnemyModel() {
  const sprite = document.querySelector(".enemy-sprite");
  const model = currentEnemy.sprite || "goblin";
  if (!sprite) return;
  sprite.className = `enemy-sprite model-${model} phase-${currentEnemy.phase || 1}`;
}

function planEnemyMove() {
  const turn = enemyTurnCount + 1;
  const baseDamage = enemyAttack;
  const phase = currentEnemy.phase || 1;
  const enemyKey = currentEnemy.baseName || currentEnemy.name;

  if (currentEnemy.isBoss) {
    if (turn % 3 === 0) {
      return {
        label: "Boss Cataclysm",
        damage: baseDamage + 6,
        swing: 3,
        apply() {
          playerStatus.burn += 1;
          playerStatus.curse += 1;
        }
      };
    }
    if (turn % 2 === 0) {
      return {
        label: "Boss Guardbreak",
        damage: baseDamage + 2,
        swing: 2,
        apply() {
          playerBarrier = Math.max(0, playerBarrier - 4);
        }
      };
    }
    return { label: "Boss Pressure", damage: baseDamage + 1, swing: 2, apply() {} };
  }

  if (enemyKey === "Goblin Scout") {
    if (turn === 1) {
      return { label: "Ambush rush", damage: baseDamage + 3, swing: 3, apply() {} };
    }
    if (phase >= 3 && turn % 2 === 0) {
      return { label: "Knife flurry", damage: baseDamage + 4, swing: 3, apply() {} };
    }
    if (phase >= 2 && turn % 2 === 1) {
      return {
        label: "Shadow sidestep",
        damage: baseDamage + 1,
        swing: 2,
        apply() {
          currentEnemy.armor += 1;
        }
      };
    }
    if (turn % 3 === 0) {
      return { label: "Quick jab", damage: baseDamage + 2, swing: 2, apply() {} };
    }
    return { label: "Testing strike", damage: baseDamage, swing: 2, apply() {} };
  }

  if (enemyKey === "Bone Knight") {
    if (turn === 1) {
      return {
        label: "Iron march",
        damage: baseDamage + 2,
        swing: 2,
        apply() {
          currentEnemy.armor += 1;
        }
      };
    }
    if (phase >= 3 && turn % 2 === 0) {
      return {
        label: "Grave cleaver",
        damage: baseDamage + 5,
        swing: 2,
        apply() {
          currentEnemy.thorns += 1;
        }
      };
    }
    if (phase >= 2 && turn % 2 === 1) {
      return {
        label: "Bone bulwark",
        damage: Math.max(1, baseDamage - 3),
        swing: 1,
        apply() {
          currentEnemy.armor += 2;
        }
      };
    }
    if (turn % 3 === 0) {
      return {
        label: "Shield stance",
        damage: Math.max(1, baseDamage - 4),
        swing: 1,
        apply() {
          currentEnemy.armor += 1;
          currentEnemy.bonusText = "Heavy armor and bone spikes. Shield stance thickens its guard.";
        }
      };
    }
    return { label: "Bone cleave", damage: baseDamage + 1, swing: 2, apply() {} };
  }

  if (enemyKey === "Swamp Witch") {
    if (turn === 1) {
      return {
        label: "Bog omen",
        damage: baseDamage + 1,
        swing: 2,
        apply() {
          playerStatus.curse += 1;
        }
      };
    }
    if (phase >= 3 && turn % 2 === 0) {
      return {
        label: "Rot hex",
        damage: baseDamage + 4,
        swing: 3,
        apply() {
          comboStreak = 0;
        }
      };
    }
    if (phase >= 2 && turn % 3 === 0) {
      return {
        label: "Leech curse",
        damage: baseDamage + 1,
        swing: 2,
        apply() {
          playerBarrier = Math.max(0, playerBarrier - 3);
        }
      };
    }
    if (turn % 2 === 0) {
      return {
        label: "Hex burst",
        damage: baseDamage + 2,
        swing: 3,
        apply() {
          playerBarrier = Math.max(0, playerBarrier - 2);
        }
      };
    }
    return { label: "Bog bolt", damage: baseDamage, swing: 3, apply() {} };
  }

  if (enemyKey === "Ash Drake") {
    if (turn === 1) {
      return {
        label: "Cinder wake",
        damage: baseDamage + 2,
        swing: 2,
        apply() {
          currentEnemy.thorns += 1;
        }
      };
    }
    if (phase >= 3 && turn % 2 === 0) {
      return {
        label: "Inferno dive",
        damage: baseDamage + 6,
        swing: 3,
        apply() {
          currentEnemy.thorns += 1;
        }
      };
    }
    if (phase >= 2 && turn % 2 === 1) {
      return {
        label: "Cinder charge",
        damage: baseDamage + 2,
        swing: 2,
        apply() {
          currentEnemy.fury += 1;
        }
      };
    }
    if (turn % 3 === 0) {
      return {
        label: "Flare breath",
        damage: baseDamage + 4,
        swing: 3,
        apply() {
          currentEnemy.thorns += 1;
        }
      };
    }
    return { label: "Scorching rake", damage: baseDamage + 1, swing: 2, apply() {} };
  }

  if (enemyKey === "Blood Archivist") {
    if (turn === 1) {
      return {
        label: "Ink bind",
        damage: baseDamage + 1,
        swing: 2,
        apply() {
          enemyWeaken = Math.max(0, enemyWeaken - 1);
          playerStatus.curse += 1;
        }
      };
    }
    if (phase >= 3 && turn % 2 === 0) {
      return {
        label: "Ritual break",
        damage: baseDamage + 5,
        swing: 3,
        apply() {
          comboStreak = 0;
          playerStatus.curse += 1;
        }
      };
    }
    if (phase >= 2 && turn % 3 === 0) {
      return {
        label: "Blood script",
        damage: baseDamage + 2,
        swing: 2,
        apply() {
          playerBarrier = Math.max(0, playerBarrier - 3);
        }
      };
    }
    return { label: "Archive lash", damage: baseDamage + 1, swing: 2, apply() {} };
  }

  if (enemyKey === "Thorn Behemoth") {
    if (turn === 1) {
      return {
        label: "Rooted stance",
        damage: baseDamage,
        swing: 1,
        apply() {
          currentEnemy.thorns += 1;
          currentEnemy.armor += 1;
        }
      };
    }
    if (phase >= 3 && turn % 2 === 0) {
      return {
        label: "Root storm",
        damage: baseDamage + 6,
        swing: 3,
        apply() {
          currentEnemy.thorns += 1;
        }
      };
    }
    if (phase >= 2 && turn % 2 === 1) {
      return {
        label: "Bark wall",
        damage: Math.max(1, baseDamage - 2),
        swing: 1,
        apply() {
          currentEnemy.armor += 2;
        }
      };
    }
    return { label: "Bramble slam", damage: baseDamage + 2, swing: 2, apply() {} };
  }

  if (phase >= 3 && turn % 2 === 0) {
    return {
      label: "Cataclysm crush",
      damage: baseDamage + 7,
      swing: 3,
      apply() {
        currentEnemy.fury += 1;
        currentEnemy.armor += 1;
      }
    };
  }

  if (phase >= 2 && turn % 2 === 1) {
    return {
      label: "Void pulse",
      damage: baseDamage + 3,
      swing: 2,
      apply() {
        playerBarrier = Math.max(0, playerBarrier - 2);
      }
    };
  }

  if (turn % 3 === 0) {
    return {
      label: "Titan crash",
      damage: baseDamage + 5,
      swing: 3,
      apply() {
        currentEnemy.fury += 1;
      }
    };
  }

  return { label: "Void hammer", damage: baseDamage + 1, swing: 3, apply() {} };
}

function getRewardKeyword(item) {
  if (item.type === "potion") return "Recovery";
  if (item.type === "relic") return "Relic";
  if ((item.thorns || 0) > 0) return "Thorns";
  if ((item.ward || 0) >= (item.power || 0) + 1) return "Defense";
  if ((item.lifesteal || 0) >= 2) return "Recovery";
  if ((item.crit || 0) >= 5) return "Crit";
  return "Damage";
}

function getIntentKind() {
  const label = nextEnemyMove?.label || "";
  if (/curse|hex|omen|ink/i.test(label)) return "curse";
  if (/guard|bulwark|shield|stance|wall/i.test(label)) return "guard";
  if (/cataclysm|charge|inferno|storm|flurry/i.test(label)) return "charge";
  return "attack";
}

function updateIntentChip() {
  const chip = document.getElementById("enemyIntentChip");
  if (!chip) return;
  const kind = getIntentKind();
  chip.className = `intent-chip ${kind}`;
  chip.innerText = kind === "guard" ? "Guard" : kind === "curse" ? "Curse" : kind === "charge" ? "Charge" : "Attack";
}
