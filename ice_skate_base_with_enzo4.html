// &#226;”€&#226;”€ KNN &#226;”€&#226;”€
function KNN(k){this.k=k||3;this.data=[];}
KNN.prototype.fit=function(X,y){this.data=X.map(function(f,i){return{f:f,y:y[i]};});};

if(!this.data.length)return 0.5;

};
function euc(a,b){var s=0;for(var i=0;i&lt;a.length;i++)s+=(a[i]-b[i])*(a[i]-b[i]);return Math.sqrt(s);}
function feat(cv){var S=20,o=document.createElement(&#39;canvas&#39;);o.width=S;o.height=S;var c=o.getContext(&#39;2d&#39;);c.drawImage(cv,0,0,S,S);var d=c.getImageData(0,0,S,S).data,f=[];for(var i=0;i&lt;d.length;i+=4)f.push((d[i]*.299+d[i+1]*.587+d[i+2]*.114)/255);return f;}

// &#226;”€&#226;”€ UI helpers &#226;”€&#226;”€

function flashCast(col){var el=document.getElementById(&#39;castFlash&#39;);el.style.background=&#39;radial-gradient(ellipse at 50% 50%,&#39;+col+&#39; 0%,transparent 70%)&#39;;el.style.opacity=&#39;1&#39;;setTimeout(function(){el.style.opacity=&#39;0&#39;;},150);}

// &#226;”€&#226;”€ HUD &#226;”€&#226;”€
function updateHUD(){

var l=Math.min(G.lvl-1,LXP.length-1),n2=Math.min(G.lvl,LXP.length-1);

G.lvl++;

}

// &#226;”€&#226;”€ Bias &#226;”€&#226;”€
function getBias(si){var n=G.samp[si].length,mx=MSLOT[G.lvl-1];return n?Math.max(0.1,1-n/(mx+2)):1.0;}
function updateBias(){
var b=(getBias(0)+getBias(1))/2,pct=Math.round(b*100);
document.getElementById(&#39;biasFill&#39;).style.width=pct+&#39;%&#39;;
var col,lbl,txt;
if(b&gt;0.65){col=&#39;#ff4444&#39;;lbl=&#39;HIGH&#39;;txt=&#39;Your AI has seen very few examples &#226;€” expect misfires and partial casts.&#39;;}
else if(b&gt;0.35){col=&#39;#ffaa00&#39;;lbl=&#39;MODERATE&#39;;txt=&#39;Getting better! More varied samples help the AI generalise.&#39;;}
else{col=&#39;#44dd88&#39;;lbl=&#39;LOW&#39;;txt=&#39;Good coverage. Bias never fully disappears &#226;€” there are always edge cases.&#39;;}
document.getElementById(&#39;biasFill&#39;).style.background=col;
document.getElementById(&#39;biasVal&#39;).style.color=col;
document.getElementById(&#39;biasVal&#39;).textContent=lbl;
document.getElementById(&#39;biasTxt&#39;).textContent=txt;
var b0=getBias(0),n0=document.getElementById(&#39;bn0&#39;);
if(n0){n0.textContent=b0&gt;.6?&#39;High bias &#226;€” will likely fizzle.&#39;:b0&gt;.3?&#39;Moderate bias &#226;€” sometimes misfires.&#39;:&#39;Low bias &#226;€” fairly reliable.&#39;;n0.style.color=b0&gt;.6?&#39;#ff4444&#39;:b0&gt;.3?&#39;#ffaa00&#39;:&#39;#44dd88&#39;;}
}

// &#226;”€&#226;”€ Spell casting &#226;”€&#226;”€
function castFireball(){
var si=0,bias=getBias(si);

var eff=Math.max(0,Math.min(1,conf+(Math.random()-.5)*bias*1.2));
if(eff&lt;0.25){

} else if(eff&lt;0.55){
showToast(&#39;&#226;š&#161; Partial cast &#226;€” bias weakened it&#39;);
showBiasHint(&#39;Partial success! More samples reduce this unpredictability.&#39;);
flashCast(&#39;rgba(255,106,0,0.2)&#39;); gainXP(5);
} else {
showToast(&#39;&#240;Ÿ”&#165; Fireball!&#39;,&#39;xp&#39;); flashCast(&#39;rgba(255,106,0,0.4)&#39;); gainXP(15);
if(cam &amp;&amp; distFP()&lt;14+G.par[0].radius) lightFire();
else showBiasHint(&#39;Too far from the fire pit! Skate closer, then cast.&#39;);
}
}

// &#226;”€&#226;”€ Spellbook &#226;”€&#226;”€
var aTab=0,drw=[false,false],lp=[{x:0,y:0},{x:0,y:0}];
function initSpellbook(){
[0,1].forEach(function(si){
clearDC(si);
var cv=document.getElementById(&#39;dc&#39;+si);
cv.addEventListener(&#39;mousedown&#39;,function(e){drw[si]=true;lp[si]=gpos(cv,e);dotDraw(si);});
cv.addEventListener(&#39;mousemove&#39;,function(e){if(drw[si])lineDraw(si,cv,e);});

cv.addEventListener(&#39;touchstart&#39;,function(e){e.preventDefault();drw[si]=true;lp[si]=gpos(cv,e);dotDraw(si);},{passive:false});
cv.addEventListener(&#39;touchmove&#39;,function(e){e.preventDefault();if(drw[si])lineDraw(si,cv,e);},{passive:false});
cv.addEventListener(&#39;touchend&#39;,function(){drw[si]=false;});
renderSlots(si); renderParams(si);
});
updateBias();
document.getElementById(&#39;tab0&#39;).addEventListener(&#39;click&#39;,function(){swTab(0);});
document.getElementById(&#39;tab1&#39;).addEventListener(&#39;click&#39;,function(){swTab(1);});
document.getElementById(&#39;btnClr&#39;).addEventListener(&#39;click&#39;,function(){clearDC(aTab);});
document.getElementById(&#39;btnAdd&#39;).addEventListener(&#39;click&#39;,addSamp);
document.getElementById(&#39;btnSeal&#39;).addEventListener(&#39;click&#39;,sealSpell);
document.getElementById(&#39;sbClose&#39;).addEventListener(&#39;click&#39;,toggleSB);
document.getElementById(&#39;spellBtn&#39;).addEventListener(&#39;click&#39;,toggleSB);
document.getElementById(&#39;winCont&#39;).addEventListener(&#39;click&#39;,function(){document.getElementById(&#39;winScreen&#39;).style.display=&#39;none&#39;;});
}
function gpos(cv,e){var r=cv.getBoundingClientRect(),sx=cv.width/r.width,sy=cv.height/r.height,s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*sx,y:(s.clientY-r.top)*sy};}
function dotDraw(si){var cv=document.getElementById(&#39;dc&#39;+si),c=cv.getContext(&#39;2d&#39;);c.beginPath();c.arc(lp[si].x,lp[si].y,5,0,Math.PI*2);c.fillStyle=SPC[si].dc;c.shadowColor=SPC[si].dc;c.shadowBlur=8;c.fill();c.shadowBlur=0;}
function lineDraw(si,cv,e){var p=gpos(cv,e),c=cv.getContext(&#39;2d&#39;);c.beginPath();c.moveTo(lp[si].x,lp[si].y);c.lineTo(p.x,p.y);c.strokeStyle=SPC[si].dc;c.lineWidth=8;c.lineCap=&#39;round&#39;;c.shadowColor=SPC[si].dc;c.shadowBlur=10;c.stroke();c.shadowBlur=0;lp[si]=p;}
function clearDC(si){var cv=document.getElementById(&#39;dc&#39;+si),c=cv.getContext(&#39;2d&#39;);c.fillStyle=&#39;#060e1c&#39;;c.fillRect(0,0,cv.width,cv.height);c.strokeStyle=&#39;rgba(168,216,234,0.05)&#39;;c.lineWidth=1;for(var x=0;x&lt;cv.width;x+=25){c.beginPath();c.moveTo(x,0);c.lineTo(x,cv.height);c.stroke();}for(var y=0;y&lt;cv.height;y+=25){c.beginPath();c.moveTo(0,y);c.lineTo(cv.width,y);c.stroke();}}
function hasDraw(si){var d=document.getElementById(&#39;dc&#39;+si).getContext(&#39;2d&#39;).getImageData(0,0,368,148).data;for(var i=0;i&lt;d.length;i+=4)if(d[i]&gt;15||d[i+1]&gt;15||d[i+2]&gt;15)return true;return false;}
function swTab(si){aTab=si;[0,1].forEach(function(i){document.getElementById(&#39;tab&#39;+i).classList.toggle(&#39;on&#39;,i===si);document.getElementById(&#39;panel&#39;+i).classList.toggle(&#39;hide&#39;,i!==si);});}
function addSamp(){
var si=aTab;
if(!hasDraw(si)){showToast(&#39;Draw the gesture first!&#39;);return;}
if(G.samp[si].length&gt;=MSLOT[G.lvl-1]){showToast(&#39;Level up to unlock more slots!&#39;);return;}

var th=document.createElement(&#39;canvas&#39;);th.width=34;th.height=34;th.getContext(&#39;2d&#39;).drawImage(cv,0,0,34,34);

function trainSpell(si){

var knn=new KNN(Math.max(1,Math.min(3,G.samp[si].length)));
knn.fit(G.samp[si].map(function(s){return s.f;}),G.samp[si].map(function(){return 1;}));

}

info.innerHTML=&#39;&lt;div class=&quot;slot-lbl&quot;&gt;SAMPLE &#39;+(i+1)+&#39;&lt;/div&gt;&lt;div class=&quot;slot-st&quot;&gt;&#39;+(filled?&#39;&#226;œ“ inscribed&#39;:locked?&#39;&#240;Ÿ”’ lvl &#39;+(i+1):&#39;empty&#39;)+&#39;&lt;/div&gt;&#39;;

function renderParams(si){

SPC[si].params.forEach(function(p){
var v=G.par[si][p.key],row=document.createElement(&#39;div&#39;);row.className=&#39;param-row&#39;;
row.innerHTML=&#39;&lt;div class=&quot;param-lbl&quot;&gt;&lt;span&gt;&#39;+p.label+&#39;&lt;/span&gt;&lt;span class=&quot;param-v&quot; id=&quot;pv_&#39;+si+&#39;_&#39;+p.key+&#39;&quot;&gt;&#39;+v+p.unit+&#39;&lt;/span&gt;&lt;/div&gt;&lt;input class=&quot;param-sl&quot; type=&quot;range&quot; min=&quot;&#39;+p.min+&#39;&quot; max=&quot;&#39;+p.max+&#39;&quot; value=&quot;&#39;+v+&#39;&quot; data-si=&quot;&#39;+si+&#39;&quot; data-k=&quot;&#39;+p.key+&#39;&quot; data-u=&quot;&#39;+p.unit+&#39;&quot;&gt;&#39;;

c.querySelectorAll(&#39;.param-sl&#39;).forEach(function(sl){

});
}

  border-radius: 18px;
  box-shadow: 0 8px 0 rgba(15, 23, 42, 0.18);
}

.wide-panel {
  width: auto;
}

.card-container {
  perspective: 1000px;
  margin-top: 16px;
}

.card {
  width: 100%;
  height: 360px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s;
}

.card.flip {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 18px;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 22px;
  box-sizing: border-box;
}

.front {
  background: linear-gradient(180deg, #fffef4, #dde8ff);
  border: 4px solid #1e293b;
}

.back {
  background: linear-gradient(180deg, #fff4cf, #ffd6a5);
  border: 4px solid #1e293b;
  transform: rotateY(180deg);
}

.enemy-card {
  background: linear-gradient(180deg, #fffef4, #ffe1d6);
  min-height: 220px;
  border: 4px solid #1e293b;
}

.health-bar {
  width: 100%;
  height: 16px;
  background: #cbd5e1;
  border-radius: 999px;
  margin-top: 10px;
  overflow: hidden;
  border: 2px solid #1e293b;
}

.health-fill {
  height: 100%;
  width: 100%;
  transition: width 0.35s ease;
}

#playerHealth {
  background: linear-gradient(90deg, #22c55e, #86efac);
}

#enemyHealth {
  background: linear-gradient(90deg, #ef4444, #fb7185);
}

.info,
.stat-list {
  margin-top: 14px;
  line-height: 1.7;
}

.stat-list {
  text-align: left;
  background: #fffaf0;
  padding: 12px 14px;
  border-radius: 14px;
  border: 3px solid #1e293b;
}

.stat-list strong {
  color: #1d4ed8;
}

.question {
  font-size: 1.45rem;
  margin: 14px 0 10px;
}

input {
  width: 100%;
  max-width: 180px;
  padding: 10px;
  margin: 10px 0 12px;
  border-radius: 8px;
  border: 3px solid #1e293b;
  text-align: center;
  font-size: 1rem;
}

.spell-book {
  margin-top: 28px;
  text-align: left;
}

.spell-grid,
.reward-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 14px;
  margin-top: 12px;
}

.spell-button,
.reward-choice {
  text-align: left;
  background: linear-gradient(180deg, #fffef5, #dbeafe);
  border: 3px solid #1e293b;
  color: #1f2937;
  box-shadow: 0 6px 0 rgba(30, 41, 59, 0.12);
}

.spell-button.selected {
  border-color: #eab308;
  box-shadow: 0 0 0 4px rgba(234, 179, 8, 0.22);
}

.reward-choice {
  background: linear-gradient(180deg, #fff7ed, #fde68a);
}

.card-title {
  display: block;
  font-size: 1rem;
  margin-bottom: 6px;
}

.card-rarity {
  display: inline-block;
  margin-bottom: 8px;
  font-size: 0.8rem;
  color: #b45309;
}

.card-meta {
  display: block;
  font-size: 0.88rem;
  line-height: 1.5;
  opacity: 0.95;
}

.status {
  min-height: 24px;
  margin-top: 16px;
  color: #1d4ed8;
  font-weight: bold;
}

.reward-panel {
  display: none;
  margin: 28px auto 0;
  padding: 18px;
  max-width: 980px;
  background: #f8f1d0;
  border: 4px solid #1e293b;
  border-radius: 18px;
  box-shadow: 0 8px 0 rgba(15, 23, 42, 0.18);
}

.reward-panel.show {
  display: block;
}

.hint {
  color: #475569;
  font-size: 0.92rem;
}

.battle-panel {
  background: linear-gradient(180deg, #d8f8ff 0%, #b5e48c 100%);
}

@media (max-width: 980px) {
  .game-area {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="screen">
  <h1>Magic Math Battle</h1>
  <p class="subtitle">
    Draft enchanted cards after each victory, drink rare stat potions, and cut through enemies in a fast fantasy duel.
  </p>

  <div class="buttons">
    <button onclick="chooseLevel(1)">Level 1</button>
    <button onclick="chooseLevel(2)">Level 2</button>
    <button onclick="chooseLevel(3)">Level 3</button>
    <button onclick="chooseLevel(4)">Level 4</button>
    <button onclick="chooseLevel(5)">Level 5</button>
  </div>

  <div class="game-area">
    <div class="panel">
      <h2>Mage</h2>
      <div class="health-bar"><div class="health-fill" id="playerHealth"></div></div>
      <div id="playerHPText">HP: 180 / 180</div>
      <div class="stat-list" id="playerStatsPanel"></div>

      <div class="card-container">
        <div class="card" id="playerCard">
          <div class="card-face front">
            <h3 id="activeSpellName">Choose a spell</h3>
            <div id="question" class="question">Pick a level and a spell card</div>
            <input id="answer" type="number" placeholder="Answer">
            <button class="cast-button" onclick="submitAnswer()">Cast Spell</button>
            <p class="hint">Selected spell damage: <span id="spellDamage">0</span></p>
          </div>
          <div class="card-face back">
            <h3 id="result">Your magic gathers...</h3>
          </div>
        </div>
      </div>

      <div class="info">
        Level: <span id="level">-</span><br>
        Score: <span id="score">0</span><br>
        Cards Earned: <span id="cardsEarned">1</span>
      </div>
    </div>

    <div class="panel battle-panel">
      <h2>Dark Foe</h2>
      <div class="card-face enemy-card" style="position: relative; inset: auto;">
        <h3 id="enemyName">Goblin Scout</h3>
        <p id="enemyFlavor">A sneaky foe blocks your path.</p>
        <div class="stat-list" id="enemyStatsPanel"></div>
      </div>
      <div class="health-bar"><div class="health-fill" id="enemyHealth"></div></div>
      <div id="enemyHPText">HP: 150 / 150</div>
      <div id="enemyAttackText" class="hint">Enemy attack: 10</div>
      <p class="status" id="statusText">Defeat this enemy to draft one of three spell cards.</p>
    </div>

    <div class="panel wide-panel">
      <h2>Arcane Notes</h2>
      <div class="stat-list">
        <div><strong>Permanent Mage Stats</strong> come from every card and potion blessing you keep.</div>
        <div><strong>Power</strong> raises all spell damage.</div>
        <div><strong>Ward</strong> lowers reflected damage and enemy hits.</div>
        <div><strong>Focus</strong> improves critical spell bursts.</div>
        <div><strong>Vitality</strong> increases max HP for the whole run.</div>
        <div><strong>Lifesteal</strong> heals you on correct casts.</div>
        <div><strong>Death Blessings</strong> make every new run stronger after defeat.</div>
        <div><strong>Enemy Armor</strong> reduces spell damage.</div>
        <div><strong>Enemy Thorns</strong> hurts you whenever you land a hit.</div>
      </div>
    </div>
  </div>

  <section class="spell-book">
    <h2>Spell Cards</h2>
    <p class="hint">Each card has active combat stats and permanent bonuses that stay with you for the full run.</p>
    <div class="spell-grid" id="spellGrid"></div>
  </section>

  <section class="reward-panel" id="rewardPanel">
    <h2>Choose Your Reward</h2>
    <p class="hint">Choose an enchanted card or occasional potion. Its blessings are added to your mage immediately.</p>
    <div class="reward-grid" id="rewardGrid"></div>
  </section>

  <section class="reward-panel" id="deathPanel">
    <h2>Choose A Death Blessing</h2>
    <p class="hint">Defeat has forged your mage. Choose how your next run grows stronger.</p>
    <div class="reward-grid" id="deathGrid"></div>
  </section>
</div>

<script>
const spellPool = [
  { id: "spark", name: "Spark Shot", rarity: "Common", minLevel: 1, baseDamage: 3, crit: 3, lifesteal: 0, vitality: 0, power: 0, ward: 1, focus: 0, text: "A reliable starter spell with a little ward." },
  { id: "ember", name: "Ember Burst", rarity: "Common", minLevel: 1, baseDamage: 6, crit: 4, lifesteal: 0, vitality: 0, power: 1, ward: 0, focus: 0, text: "A hot card that adds steady damage." },
  { id: "moss", name: "Moss Guard", rarity: "Common", minLevel: 1, baseDamage: 2, crit: 2, lifesteal: 8, vitality: 14, power: 0, ward: 2, focus: 0, text: "A defensive card that thickens your health bar." },
  { id: "frost", name: "Frost Sigil", rarity: "Rare", minLevel: 2, baseDamage: 7, crit: 5, lifesteal: 0, vitality: 0, power: 1, ward: 1, focus: 1, text: "Sharp ice magic for disciplined mages." },
  { id: "storm", name: "Storm Chain", rarity: "Rare", minLevel: 3, baseDamage: 10, crit: 8, lifesteal: 0, vitality: 0, power: 2, ward: 0, focus: 2, text: "A violent chain of magic with strong crit scaling." },
  { id: "prism", name: "Prism Bloom", rarity: "Rare", minLevel: 2, baseDamage: 5, crit: 4, lifesteal: 10, vitality: 12, power: 0, ward: 1, focus: 1, text: "Balanced magic that sustains a long run." },
  { id: "nova", name: "Sun Nova", rarity: "Epic", minLevel: 4, baseDamage: 14, crit: 10, lifesteal: 0, vitality: 0, power: 3, ward: 0, focus: 2, text: "A radiant blast with huge burst potential." },
  { id: "aegis", name: "Aegis Rune", rarity: "Epic", minLevel: 3, baseDamage: 6, crit: 3, lifesteal: 0, vitality: 16, power: 0, ward: 4, focus: 0, text: "Turns your deck into a shielded fortress." },
  { id: "void", name: "Void Lantern", rarity: "Epic", minLevel: 4, baseDamage: 11, crit: 12, lifesteal: 9, vitality: 4, power: 2, ward: 0, focus: 3, text: "Aggressive arcane pressure with a risky edge." },
  { id: "meteor", name: "Meteor Crown", rarity: "Legendary", minLevel: 5, baseDamage: 18, crit: 14, lifesteal: 0, vitality: 0, power: 4, ward: 0, focus: 3, text: "Legendary power for impossible moments." },
  { id: "oracle", name: "Oracle Glass", rarity: "Legendary", minLevel: 4, baseDamage: 9, crit: 18, lifesteal: 14, vitality: 16, power: 1, ward: 1, focus: 4, text: "A wise relic that transforms your long-term stats." }
];

const enemyRoster = [
  { name: "Goblin Scout", flavor: "A sneaky foe blocks your path.", maxHP: 150, attack: 10, armor: 1, thorns: 0, fury: 0, bonusText: "Light armor. Fast but flimsy." },
  { name: "Bone Knight", flavor: "A restless warrior rises from the ruins.", maxHP: 180, attack: 12, armor: 3, thorns: 1, fury: 0, bonusText: "Heavy armor and bone spikes." },
  { name: "Swamp Witch", flavor: "Hexes twist the air around her.", maxHP: 160, attack: 11, armor: 1, thorns: 0, fury: 2, bonusText: "Fury makes her hits surge unpredictably." },
  { name: "Ash Drake", flavor: "Its scales glow like a dying forge.", maxHP: 190, attack: 13, armor: 2, thorns: 2, fury: 1, bonusText: "Flaming thorns punish every clean hit." },
  { name: "Void Titan", flavor: "A towering nightmare waits at the gate.", maxHP: 220, attack: 15, armor: 4, thorns: 2, fury: 2, bonusText: "Massive armor, brutal force, no mercy." }
];

const potionPool = [
  { id: "potion-crimson", type: "potion", name: "Crimson Vitality Draught", rarity: "Potion", health: 45, vitality: 10, power: 0, ward: 0, focus: 0, lifesteal: 0, text: "A ruby tonic that restores health and hardens your life force." },
  { id: "potion-sage", type: "potion", name: "Sagefire Elixir", rarity: "Potion", health: 28, vitality: 0, power: 2, ward: 0, focus: 1, lifesteal: 4, text: "A glowing brew that sharpens spellwork and leaves healing sparks behind." },
  { id: "potion-aegis", type: "potion", name: "Moonshield Philter", rarity: "Potion", health: 32, vitality: 6, power: 0, ward: 2, focus: 0, lifesteal: 0, text: "Silver dust swirls through this potion, wrapping you in a lasting ward." }
];

let level = 0;
let score = 0;
let currentAnswer = null;
let currentSpellId = "spark";
let unlockedSpellIds = ["spark"];
let rewardChoices = [];
let deathChoices = [];
let enemyIndex = 0;
let potionBonuses = { power: 0, ward: 0, focus: 0, vitality: 0, lifesteal: 0 };
let deathBlessings = { power: 0, ward: 0, focus: 0, vitality: 0, lifesteal: 0, deaths: 0 };

let basePlayerMaxHP = 180;
let playerHP = 180;
let maxPlayerHP = 180;

let enemyHP = 150;
let maxEnemyHP = 150;
let enemyAttack = 10;
let currentEnemy = enemyRoster[0];

function chooseLevel(lvl) {
  level = lvl;
  document.getElementById("level").innerText = lvl;
  setStatus(`Level ${lvl} selected. Cast with ${getCurrentSpell().name}.`);
  generateQuestion();
}

function getSpellById(id) {
  return spellPool.find((spell) => spell.id === id);
}

function getCurrentSpell() {
  return getSpellById(currentSpellId) || spellPool[0];
}

function getPlayerStats() {
  const stats = { power: 0, ward: 0, focus: 0, vitality: 0, lifesteal: 0 };

  unlockedSpellIds.forEach((id) => {
    const spell = getSpellById(id);
    stats.power += spell.power;
    stats.ward += spell.ward;
    stats.focus += spell.focus;
    stats.vitality += spell.vitality;
    stats.lifesteal += spell.lifesteal;
  });

  stats.power += potionBonuses.power;
  stats.ward += potionBonuses.ward;
  stats.focus += potionBonuses.focus;
  stats.vitality += potionBonuses.vitality;
  stats.lifesteal += potionBonuses.lifesteal;

  stats.power += deathBlessings.power;
  stats.ward += deathBlessings.ward;
  stats.focus += deathBlessings.focus;
  stats.vitality += deathBlessings.vitality;
  stats.lifesteal += deathBlessings.lifesteal;

  return stats;
}

function recalculatePlayerTotals(preserveRatio = true) {
  const oldMax = maxPlayerHP;
  const ratio = oldMax > 0 ? playerHP / oldMax : 1;
  const stats = getPlayerStats();
  maxPlayerHP = basePlayerMaxHP + stats.vitality;
  playerHP = preserveRatio ? Math.round(maxPlayerHP * ratio) : Math.min(playerHP, maxPlayerHP);
  if (playerHP > maxPlayerHP) playerHP = maxPlayerHP;
}

function calculateDamage() {
  const spell = getCurrentSpell();
  const stats = getPlayerStats();
  const base = level * 8 + spell.baseDamage + stats.power;
  const critChance = spell.crit + stats.focus * 2;
  const crit = rand(1, 100) <= critChance;
  const critMultiplier = crit ? 1.5 : 1;
  const rawDamage = Math.round(base * critMultiplier);
  const finalDamage = Math.max(1, rawDamage - currentEnemy.armor);
  return { value: finalDamage, crit };
}

function calculateEnemyAttack() {
  const stats = getPlayerStats();
  const raw = enemyAttack + rand(0, 4 + currentEnemy.fury);
  return Math.max(1, raw - stats.ward);
}

function renderPlayerStats() {
  const stats = getPlayerStats();
  document.getElementById("playerStatsPanel").innerHTML = `
    <div><strong>Power:</strong> ${stats.power}</div>
    <div><strong>Ward:</strong> ${stats.ward}</div>
    <div><strong>Focus:</strong> ${stats.focus}</div>
    <div><strong>Vitality:</strong> +${stats.vitality} HP</div>
    <div><strong>Lifesteal:</strong> ${stats.lifesteal}%</div>
    <div><strong>Deaths:</strong> ${deathBlessings.deaths}</div>
  `;
}

function renderEnemyStats() {
  document.getElementById("enemyStatsPanel").innerHTML = `
    <div><strong>Armor:</strong> ${currentEnemy.armor}</div>
    <div><strong>Thorns:</strong> ${currentEnemy.thorns}</div>
    <div><strong>Fury:</strong> ${currentEnemy.fury}</div>
    <div>${currentEnemy.bonusText}</div>
  `;
}

function formatSpellCard(spell) {
  return `
    <span class="card-rarity">${spell.rarity}</span>
    <span class="card-title">${spell.name}</span>
    <span class="card-meta">Level ${spell.minLevel}+ | Base damage +${spell.baseDamage}</span>
    <span class="card-meta">Power +${spell.power} | Ward +${spell.ward} | Focus +${spell.focus}</span>
    <span class="card-meta">Vitality +${spell.vitality} | Lifesteal ${spell.lifesteal}% | Crit ${spell.crit}%</span>
    <span class="card-meta">${spell.text}</span>
  `;
}

function formatPotionCard(potion) {
  return `
    <span class="card-rarity">${potion.rarity}</span>
    <span class="card-title">${potion.name}</span>
    <span class="card-meta">Restore ${potion.health} HP immediately</span>
    <span class="card-meta">Power +${potion.power} | Ward +${potion.ward} | Focus +${potion.focus}</span>
    <span class="card-meta">Vitality +${potion.vitality} | Lifesteal +${potion.lifesteal}%</span>
    <span class="card-meta">${potion.text}</span>
  `;
}

function formatDeathBlessing(choice) {
  return `
    <span class="card-rarity">Blessing</span>
    <span class="card-title">${choice.name}</span>
    <span class="card-meta">${choice.line1}</span>
    <span class="card-meta">${choice.line2}</span>
    <span class="card-meta">${choice.text}</span>
  `;
}

function renderSpellBook() {
  const grid = document.getElementById("spellGrid");
  grid.innerHTML = "";
  document.getElementById("cardsEarned").innerText = unlockedSpellIds.length;

  unlockedSpellIds.forEach((id) => {
    const spell = getSpellById(id);
    const button = document.createElement("button");
    button.className = "spell-button" + (id === currentSpellId ? " selected" : "");
    button.onclick = () => selectSpell(id);
    button.innerHTML = formatSpellCard(spell);
    grid.appendChild(button);
  });

  renderPlayerStats();
  updateSelectedSpell();
}

function selectSpell(id) {
  currentSpellId = id;
  renderSpellBook();

  const spell = getCurrentSpell();
  if (level && level < spell.minLevel) {
    setStatus(`${spell.name} needs level ${spell.minLevel}. Choose a tougher difficulty to use it.`);
    document.getElementById("question").innerText = `Choose at least Level ${spell.minLevel}`;
  } else if (level) {
    setStatus(`${spell.name} is ready. Solve the next problem to cast it.`);
    generateQuestion();
  } else {
    setStatus(`${spell.name} selected. Pick a level to generate a math challenge.`);
  }
}

function updateSelectedSpell() {
  const spell = getCurrentSpell();
  const stats = getPlayerStats();
  document.getElementById("activeSpellName").innerText = spell.name;
  document.getElementById("spellDamage").innerText = level ? Math.max(1, level * 8 + spell.baseDamage + stats.power - currentEnemy.armor) : spell.baseDamage + stats.power;
}

function generateQuestion() {
  const spell = getCurrentSpell();

  if (!level) {
    currentAnswer = null;
    document.getElementById("question").innerText = "Pick a level and a spell card";
    updateSelectedSpell();
    return;
  }

  if (level < spell.minLevel) {
    currentAnswer = null;
    document.getElementById("question").innerText = `${spell.name} needs Level ${spell.minLevel}`;
    updateSelectedSpell();
    return;
  }

  let a;
  let b;
  let q;

  if (level === 1) {
    a = rand(1, 10);
    b = rand(1, 10);
    currentAnswer = a + b;
    q = `${a} + ${b}`;
  } else if (level === 2) {
    a = rand(5, 20);
    b = rand(1, 10);
    currentAnswer = a - b;
    q = `${a} - ${b}`;
  } else if (level === 3) {
    a = rand(2, 12);
    b = rand(2, 12);
    currentAnswer = a * b;
    q = `${a} x ${b}`;
  } else if (level === 4) {
    b = rand(2, 10);
    currentAnswer = rand(2, 10);
    a = currentAnswer * b;
    q = `${a} / ${b}`;
  } else {
    a = rand(2, 10);
    b = rand(2, 10);
    const c = rand(1, 10);
    currentAnswer = a * b + c;
    q = `${a} x ${b} + ${c}`;
  }

  document.getElementById("question").innerText = q;
  updateSelectedSpell();
}

function submitAnswer() {
  if (rewardChoices.length > 0 || deathChoices.length > 0) {
    setStatus("Choose your pending reward or death blessing before continuing.");
    return;
  }

  if (currentAnswer === null) {
    setStatus("Choose a valid level and spell before casting.");
    return;
  }

  const answerField = document.getElementById("answer");
  if (answerField.value.trim() === "") {
    setStatus("Enter an answer before casting.");
    return;
  }

  const user = Number(answerField.value);
  const stats = getPlayerStats();
  const attackRoll = calculateDamage();
  let text = "";

  if (user === currentAnswer) {
    enemyHP -= attackRoll.value;
    score += attackRoll.value;
    text = attackRoll.crit
      ? `Critical hit for ${attackRoll.value} damage.`
      : `Hit landed for ${attackRoll.value} damage.`;

    if (stats.lifesteal > 0) {
      const heal = Math.max(1, Math.round((attackRoll.value * stats.lifesteal) / 100));
      playerHP = Math.min(maxPlayerHP, playerHP + heal);
      text += ` You heal ${heal}.`;
    }

    if (currentEnemy.thorns > 0) {
      const thornDamage = Math.max(1, currentEnemy.thorns - stats.ward);
      playerHP -= thornDamage;
      text += ` Thorns strike back for ${thornDamage}.`;
    }
  } else {
    const reflected = Math.max(1, attackRoll.value - stats.ward);
    playerHP -= reflected;
    text = `Spell reflected for ${reflected} damage.`;
  }

  clampHealth();
  updateHealthBars();
  document.getElementById("score").innerText = score;
  document.getElementById("result").innerText = text;
  document.getElementById("playerCard").classList.add("flip");

  if (enemyHP === 0) {
    setStatus("Enemy defeated. Draft one of three spell cards.");
    setTimeout(() => {
      awardSpellChoices();
    }, 500);
    return;
  }

  if (playerHP === 0) {
    setTimeout(() => {
      handleDefeat();
    }, 500);
    return;
  }

  const counterDamage = calculateEnemyAttack();
  playerHP -= counterDamage;
  clampHealth();
  updateHealthBars();
  document.getElementById("result").innerText = `${text} Enemy attacks for ${counterDamage}.`;

  if (playerHP === 0) {
    setTimeout(() => {
      handleDefeat();
    }, 500);
    return;
  }

  setTimeout(() => {
    resetCard();
    generateQuestion();
  }, 650);
}

function handleDefeat() {
  showDeathBlessings();
}

function getDeathBlessingChoices() {
  return [
    {
      id: "ember-oath",
      name: "Ember Oath",
      line1: "Power +2 | Focus +1",
      line2: "Vitality +6",
      text: "Strike harder on the next run with a more explosive spell path.",
      apply() {
        deathBlessings.power += 2;
        deathBlessings.focus += 1;
        deathBlessings.vitality += 6;
      }
    },
    {
      id: "iron-bark",
      name: "Iron Bark Vow",
      line1: "Ward +2 | Vitality +14",
      line2: "Power +0",
      text: "Turn the next run into a sturdier climb with heavier protection.",
      apply() {
        deathBlessings.ward += 2;
        deathBlessings.vitality += 14;
      }
    },
    {
      id: "moonwell",
      name: "Moonwell Grace",
      line1: "Lifesteal +2% | Vitality +8",
      line2: "Focus +1",
      text: "Build a safer recovery loop and stronger sustain for the next run.",
      apply() {
        deathBlessings.lifesteal += 2;
        deathBlessings.vitality += 8;
        deathBlessings.focus += 1;
      }
    }
  ];
}

function showDeathBlessings() {
  deathChoices = getDeathBlessingChoices();
  const deathGrid = document.getElementById("deathGrid");
  deathGrid.innerHTML = "";

  deathChoices.forEach((choice) => {
    const button = document.createElement("button");
    button.className = "reward-choice";
    button.onclick = () => claimDeathBlessing(choice.id);
    button.innerHTML = formatDeathBlessing(choice);
    deathGrid.appendChild(button);
  });

  document.getElementById("deathPanel").classList.add("show");
  setStatus("Choose a death blessing to empower your next run.");
}

function claimDeathBlessing(choiceId) {
  const choice = deathChoices.find((item) => item.id === choiceId);
  if (!choice) {
    return;
  }

  deathBlessings.deaths += 1;
  choice.apply();
  deathChoices = [];
  document.getElementById("deathPanel").classList.remove("show");
  alert(`${choice.name} empowers your next run.`);
  resetRun();
}

function getRewardChoices() {
  const lockedSpells = spellPool.filter((spell) => !unlockedSpellIds.includes(spell.id));
  const pool = [...lockedSpells];
  const picks = [];

  while (pool.length > 0 && picks.length < 3) {
    const index = rand(0, pool.length - 1);
    picks.push(pool.splice(index, 1)[0]);
  }

  if (picks.length < 3) {
    const fallback = [getSpellById("oracle"), getSpellById("meteor"), getSpellById("aegis")];
    fallback.forEach((spell) => {
      if (picks.length < 3 && !picks.some((item) => item.id === spell.id)) {
        picks.push(spell);
      }
    });
  }

  if (rand(1, 100) <= 35) {
    const potion = potionPool[rand(0, potionPool.length - 1)];
    picks[rand(0, picks.length - 1)] = potion;
  }

  return picks;
}

function awardSpellChoices() {
  resetCard();
  rewardChoices = getRewardChoices();
  const rewardGrid = document.getElementById("rewardGrid");
  rewardGrid.innerHTML = "";

  rewardChoices.forEach((spell) => {
    const button = document.createElement("button");
    button.className = "reward-choice";
    button.onclick = () => claimReward(spell.id);
    button.innerHTML = spell.type === "potion" ? formatPotionCard(spell) : formatSpellCard(spell);
    rewardGrid.appendChild(button);
  });

  document.getElementById("rewardPanel").classList.add("show");
}

function claimReward(spellId) {
  if (rewardChoices.length === 0) {
    return;
  }

  const reward = rewardChoices.find((item) => item.id === spellId);
  if (!reward) {
    return;
  }

  if (reward.type === "potion") {
    potionBonuses.power += reward.power;
    potionBonuses.ward += reward.ward;
    potionBonuses.focus += reward.focus;
    potionBonuses.vitality += reward.vitality;
    potionBonuses.lifesteal += reward.lifesteal;
  } else {
    if (!unlockedSpellIds.includes(spellId)) {
      unlockedSpellIds.push(spellId);
    }
    currentSpellId = spellId;
  }

  rewardChoices = [];
  document.getElementById("rewardPanel").classList.remove("show");

  recalculatePlayerTotals(true);
  playerHP = Math.min(maxPlayerHP, playerHP + Math.round(maxPlayerHP * 0.15) + (reward.health || 0));
  loadNextEnemy();
  renderSpellBook();
  updateHealthBars();
  generateQuestion();
  setStatus(
    reward.type === "potion"
      ? `${reward.name} restored your strength and left a permanent blessing behind.`
      : `You claimed ${getCurrentSpell().name}. Your permanent bonuses grew and you recovered some HP.`
  );
}

function loadNextEnemy() {
  enemyIndex = (enemyIndex + 1) % enemyRoster.length;
  currentEnemy = enemyRoster[enemyIndex];
  maxEnemyHP = currentEnemy.maxHP;
  enemyHP = maxEnemyHP;
  enemyAttack = currentEnemy.attack;
  document.getElementById("enemyName").innerText = currentEnemy.name;
  document.getElementById("enemyFlavor").innerText = currentEnemy.flavor;
  document.getElementById("enemyAttackText").innerText = `Enemy attack: ${enemyAttack}`;
  renderEnemyStats();
}

function clampHealth() {
  if (enemyHP < 0) enemyHP = 0;
  if (enemyHP > maxEnemyHP) enemyHP = maxEnemyHP;
  if (playerHP < 0) playerHP = 0;
  if (playerHP > maxPlayerHP) playerHP = maxPlayerHP;
}

function updateHealthBars() {
  const enemyPercent = (enemyHP / maxEnemyHP) * 100;
  const playerPercent = (playerHP / maxPlayerHP) * 100;
  document.getElementById("enemyHealth").style.width = `${enemyPercent}%`;
  document.getElementById("enemyHPText").innerText = `HP: ${enemyHP} / ${maxEnemyHP}`;
  document.getElementById("playerHealth").style.width = `${playerPercent}%`;
  document.getElementById("playerHPText").innerText = `HP: ${playerHP} / ${maxPlayerHP}`;
}

function resetCard() {
  document.getElementById("playerCard").classList.remove("flip");
  document.getElementById("answer").value = "";
}

function resetRun() {
  level = 0;
  score = 0;
  currentAnswer = null;
  currentSpellId = "spark";
  unlockedSpellIds = ["spark"];
  rewardChoices = [];
  deathChoices = [];
  enemyIndex = 0;
  potionBonuses = { power: 0, ward: 0, focus: 0, vitality: 0, lifesteal: 0 };
  currentEnemy = enemyRoster[0];
  maxPlayerHP = basePlayerMaxHP + getPlayerStats().vitality;
  playerHP = maxPlayerHP;
  maxEnemyHP = currentEnemy.maxHP;
  enemyHP = maxEnemyHP;
  enemyAttack = currentEnemy.attack;

  document.getElementById("level").innerText = "-";
  document.getElementById("score").innerText = "0";
  document.getElementById("rewardPanel").classList.remove("show");
  document.getElementById("deathPanel").classList.remove("show");
  document.getElementById("enemyName").innerText = currentEnemy.name;
  document.getElementById("enemyFlavor").innerText = currentEnemy.flavor;
  document.getElementById("enemyAttackText").innerText = `Enemy attack: ${enemyAttack}`;

  renderEnemyStats();
  renderSpellBook();
  resetCard();
  updateHealthBars();
  generateQuestion();
  setStatus("Pick a level and start building permanent stats into your deck.");
}

function setStatus(message) {
  document.getElementById("statusText").innerText = message;
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

renderEnemyStats();
renderSpellBook();
updateHealthBars();
generateQuestion();
</script>
</body>
