<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Palette Generator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#111;}
#app{display:flex;flex-direction:column;height:100vh;}
#bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border-bottom:1px solid rgba(0,0,0,.09);flex-shrink:0;user-select:none;}
.btn{padding:5px 11px;border-radius:6px;border:1px solid rgba(0,0,0,.12);background:transparent;color:#111;cursor:pointer;font-size:12.5px;font-family:inherit;white-space:nowrap;line-height:1.4;}
.btn:hover{background:rgba(0,0,0,.05);}
.btn.pri{background:#111;color:#fff;border-color:#111;}
.btn.pri:hover{background:#333;}
.vsep{width:1px;height:18px;background:rgba(0,0,0,.1);flex-shrink:0;}
.sp{flex:1;}
#nIn{width:44px;padding:5px 6px;border:1px solid rgba(0,0,0,.14);border-radius:6px;font-size:13px;font-family:inherit;text-align:center;color:#111;background:#fafafa;}
#nIn:focus{outline:none;border-color:#555;}
select.btn{padding:5px 7px;}
#swarea{flex:1;min-height:0;}
#pal{display:flex;height:100%;}
.sw{position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:0 4px 14px;min-width:0;}
.sc{position:absolute;top:12px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:7px;opacity:0;transition:opacity .15s;pointer-events:none;}
.sw:hover .sc,.sw.act .sc{opacity:1;pointer-events:all;}
.cb{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .08s;}
.cb:hover{transform:scale(1.1);}
.shex{text-align:center;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:3px 7px;border-radius:4px;}
.rh{width:7px;flex-shrink:0;cursor:col-resize;position:relative;z-index:5;}
.rh::after{content:'';position:absolute;top:12%;bottom:12%;left:50%;transform:translateX(-50%);width:2px;border-radius:1px;background:transparent;transition:background .12s;}
.rh:hover::after,.rh.dragging::after{background:rgba(128,128,128,.4);}
#bot{flex-shrink:0;background:#fff;border-top:1px solid rgba(0,0,0,.08);height:298px;display:flex;flex-direction:column;}
#tabs{display:flex;padding:0 14px;border-bottom:1px solid rgba(0,0,0,.08);flex-shrink:0;}
.tab{padding:8px 14px;font-size:12.5px;border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;color:rgba(0,0,0,.38);font-family:inherit;margin-bottom:-1px;}
.tab:hover{color:#111;}
.tab.on{color:#111;border-bottom-color:#111;}
.tc{display:none;flex:1;min-height:0;}
.tc.on{display:flex;}
#et{padding:13px 16px;gap:20px;overflow:auto;align-items:flex-start;}
#er{display:flex;flex-direction:column;gap:11px;flex:1;min-width:160px;padding-top:2px;}
.el{font-size:10px;color:rgba(0,0,0,.35);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
#cprev{height:32px;border-radius:6px;border:1px solid rgba(0,0,0,.09);}
.hrow{display:flex;align-items:center;gap:7px;}
#hi{font-size:12px;padding:5px 9px;border-radius:6px;border:1px solid rgba(0,0,0,.12);width:90px;letter-spacing:.07em;text-transform:uppercase;font-family:'Courier New',monospace;color:#111;background:#fafafa;}
#hi:focus{outline:none;border-color:#555;}
.kh{font-size:11px;color:rgba(0,0,0,.28);line-height:1.9;}
.kh kbd{background:#f0efe9;border:1px solid rgba(0,0,0,.1);padding:1px 5px;border-radius:3px;font-size:9.5px;font-family:inherit;}
#pt{flex-direction:column;overflow:hidden;}
#pst{display:flex;padding:6px 12px 0;border-bottom:1px solid rgba(0,0,0,.08);flex-shrink:0;gap:2px;overflow-x:auto;}
.pst{padding:5px 12px;font-size:12px;border-radius:4px 4px 0 0;border:none;background:none;cursor:pointer;color:rgba(0,0,0,.38);font-family:inherit;white-space:nowrap;}
.pst:hover{color:#111;}
.pst.on{color:#111;font-weight:500;background:#f4f3ee;}
#pf{flex:1;overflow:auto;padding:14px;background:#e8e7e1;}
.pmock{border-radius:8px;overflow:hidden;box-shadow:0 2px 18px rgba(0,0,0,.14);max-width:780px;margin:0 auto;}
#xt{flex-direction:column;gap:10px;padding:14px 16px;overflow:auto;}
.xrow{display:flex;gap:7px;flex-wrap:wrap;}
pre#xcode{font-size:11px;line-height:1.7;background:#f4f3ee;border-radius:7px;padding:10px 12px;overflow:auto;max-height:130px;color:#111;border:1px solid rgba(0,0,0,.07);font-family:'Courier New',monospace;white-space:pre;flex-shrink:0;}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:7px 16px;border-radius:20px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .2s;z-index:9999;white-space:nowrap;}
#toast.on{opacity:1;}
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <label style="font-size:12px;color:rgba(0,0,0,.4);">Colors</label>
    <input id="nIn" type="number" min="2" max="20" value="5" oninput="onNIn()">
    <div class="vsep"></div>
    <select id="hmSel" class="btn">
      <option value="none">No harmony</option>
      <option value="analogous">Analogous</option>
      <option value="complementary">Complementary</option>
      <option value="triadic">Triadic</option>
      <option value="split">Split complement</option>
      <option value="tetradic">Tetradic</option>
      <option value="mono">Monochromatic</option>
    </select>
    <div class="sp"></div>
    <div class="btn" onclick="doCopyCSS()">Copy CSS</div>
    <div class="btn" onclick="doCopyHexList()">Copy hexes</div>
    <div class="btn pri" onclick="gen()">Generate &nbsp;<span style="opacity:.38;font-size:10.5px;">⎵</span></div>
  </div>
  <div id="swarea"><div id="pal"></div></div>
  <div id="bot">
    <div id="tabs">
      <button class="tab on" data-t="e" onclick="setTab('e')">Edit color</button>
      <button class="tab" data-t="p" onclick="setTab('p')">Preview</button>
      <button class="tab" data-t="x" onclick="setTab('x')">Export</button>
    </div>
    <div class="tc on" id="et">
      <canvas id="cpick" width="232" height="232" style="cursor:crosshair;flex-shrink:0;border-radius:50%;display:block;"></canvas>
      <div id="er">
        <div><div class="el">Preview</div><div id="cprev"></div></div>
        <div>
          <div class="el">Hex code</div>
          <div class="hrow">
            <span style="color:rgba(0,0,0,.28);font-size:14px;">#</span>
            <input id="hi" type="text" maxlength="6" placeholder="RRGGBB" autocomplete="off" spellcheck="false" oninput="onHi()" onchange="onHi()">
            <div class="btn" onclick="doHexCopy()">Copy</div>
          </div>
        </div>
        <div class="kh">
          Click ✏ on a swatch to edit it here<br>
          <kbd>←</kbd> <kbd>→</kbd> hue &nbsp; <kbd>↑</kbd> <kbd>↓</kbd> brightness<br>
          <kbd>Shift</kbd> = ×10 steps &nbsp; drag dividers to resize<br>
          Double-click any divider to equalize widths
        </div>
      </div>
    </div>
    <div class="tc" id="pt">
      <div id="pst">
        <button class="pst on" onclick="setPrev('dash',this)">Dashboard</button>
        <button class="pst" onclick="setPrev('mobile',this)">Mobile</button>
        <button class="pst" onclick="setPrev('landing',this)">Landing</button>
        <button class="pst" onclick="setPrev('typo',this)">Article</button>
        <button class="pst" onclick="setPrev('pattern',this)">Pattern</button>
      </div>
      <div id="pf"></div>
    </div>
    <div class="tc" id="xt">
      <div class="xrow">
        <div class="btn" onclick="xCSS()">CSS vars</div>
        <div class="btn" onclick="xHexArr()">Hex list</div>
        <div class="btn" onclick="xJSON()">JSON</div>
        <div class="btn" onclick="xTailwind()">Tailwind</div>
        <div class="btn" onclick="xPNG()">Export PNG</div>
      </div>
      <pre id="xcode"></pre>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
'use strict';
const TAU=Math.PI*2,PI=Math.PI;

// Color math
function hsv2hex(h,s,v){
  const c=v*s,x=c*(1-Math.abs((h/60)%2-1)),m=v-c;
  let r,g,b;
  if(h<60)[r,g,b]=[c,x,0];else if(h<120)[r,g,b]=[x,c,0];
  else if(h<180)[r,g,b]=[0,c,x];else if(h<240)[r,g,b]=[0,x,c];
  else if(h<300)[r,g,b]=[x,0,c];else[r,g,b]=[c,0,x];
  return'#'+[r+m,g+m,b+m].map(n=>Math.round(n*255).toString(16).padStart(2,'0')).join('');
}
function hex2hsv(hex){
  const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0,s=mx===0?0:d/mx,v=mx;
  if(d>0){if(mx===r)h=((g-b)/d%6)*60;else if(mx===g)h=((b-r)/d+2)*60;else h=((r-g)/d+4)*60;if(h<0)h+=360;}
  return{h,s,v};
}
function lum(hex){
  const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  return .2126*r+.7152*g+.0722*b;
}
function ton(hex){return lum(hex)>.42?'#111':'#fff';}
function toast(msg){
  const e=document.getElementById('toast');e.textContent=msg;e.classList.add('on');
  clearTimeout(toast._t);toast._t=setTimeout(()=>e.classList.remove('on'),1600);
}
function cp(t){
  try{navigator.clipboard.writeText(t);}catch(e){
    const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);
  }
}

// State
const ST={cols:[],n:5,ed:null,prevTab:'dash'};
function rndCol(){return{h:Math.random()*360,s:.4+Math.random()*.52,v:.35+Math.random()*.55,locked:false,flex:1};}
function gHex(i){return hsv2hex(ST.cols[i].h,ST.cols[i].s,ST.cols[i].v);}
function gAll(){return ST.cols.map((_,i)=>gHex(i));}

// Generate
function gen(){
  const hm=document.getElementById('hmSel').value,n=ST.n;
  while(ST.cols.length<n)ST.cols.push(rndCol());
  ST.cols.length=n;
  // Use first locked color as the harmony anchor
  const li=ST.cols.reduce((a,c,i)=>c.locked?[...a,i]:a,[]);
  const aH=li.length>0?ST.cols[li[0]].h:Math.random()*360;
  const hfn={
    none:()=>Math.random()*360,
    analogous:(i,n)=>(aH+(i-Math.floor(n/2))*22+720)%360,
    complementary:i=>i%2===0?aH:(aH+180)%360,
    triadic:i=>(aH+(i%3)*120)%360,
    split:i=>i===0?aH:i%2===0?(aH+150)%360:(aH+210)%360,
    tetradic:i=>(aH+(i%4)*90)%360,
    mono:()=>aH,
  };
  ST.cols.forEach((c,i)=>{
    if(c.locked)return;
    const h=(hfn[hm]||hfn.none)(i,n);
    ST.cols[i]={...c,h,
      s:hm==='mono'?.18+Math.random()*.78:.38+Math.random()*.52,
      v:hm==='mono'?.15+(i/(n-1||1))*.78:.32+Math.random()*.58,
      locked:false};
  });
  if(ST.ed!==null&&ST.ed>=n)ST.ed=null;
  render();if(ST.ed!==null)fillEd(ST.ed);refreshLive();
}

function onNIn(){
  const v=parseInt(document.getElementById('nIn').value);
  if(isNaN(v))return;
  ST.n=Math.max(2,Math.min(20,v));
  while(ST.cols.length<ST.n)ST.cols.push(rndCol());
  ST.cols.length=ST.n;
  if(ST.ed!==null&&ST.ed>=ST.n)ST.ed=null;
  render();refreshLive();
}

// Icons
const ICO={
  lockOn:`<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="1.5" y="5.5" width="10" height="7" rx="1.5"/><path d="M3.5 5.5V4A3 3 0 0 1 9.5 4v1.5"/></svg>`,
  lockOff:`<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="1.5" y="5.5" width="10" height="7" rx="1.5"/><path d="M9.5 5.5V4A3 3 0 0 0 3.8 2.8"/></svg>`,
  edit:`<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 1.5L10.5 3.5 3.5 10.5 1 11 1.5 8.5Z"/></svg>`,
  grip:`<svg width="10" height="11" viewBox="0 0 10 11"><circle cx="2.5" cy="2" r=".9" fill="currentColor"/><circle cx="7.5" cy="2" r=".9" fill="currentColor"/><circle cx="2.5" cy="5.5" r=".9" fill="currentColor"/><circle cx="7.5" cy="5.5" r=".9" fill="currentColor"/><circle cx="2.5" cy="9" r=".9" fill="currentColor"/><circle cx="7.5" cy="9" r=".9" fill="currentColor"/></svg>`,
};

// Render swatches
let dragSrc=null;
function render(){
  const pal=document.getElementById('pal');pal.innerHTML='';
  ST.cols.forEach((col,i)=>{
    const hex=gHex(i),L=lum(hex);
    const tc=L>.4?'rgba(0,0,0,.72)':'rgba(255,255,255,.9)';
    const bc=L>.4?'rgba(0,0,0,.2)':'rgba(255,255,255,.38)';
    const bg2=L>.4?'rgba(0,0,0,.1)':'rgba(255,255,255,.18)';
    const sw=document.createElement('div');
    sw.className='sw'+(ST.ed===i?' act':'');
    sw.style.cssText='background:'+hex+';flex:'+col.flex+';';
    sw.draggable=true;
    sw.innerHTML=
      '<div class="sc">'+
        '<div class="cb" style="color:'+tc+';background:'+bg2+';border:1.5px solid '+bc+';cursor:grab;">'+ICO.grip+'</div>'+
        '<div class="cb" style="color:'+tc+';background:'+(col.locked?'rgba(255,255,255,.25)':bg2)+';border:1.5px solid '+(col.locked?'rgba(255,255,255,.65)':bc)+';" onclick="tLock('+i+')">'+(col.locked?ICO.lockOn:ICO.lockOff)+'</div>'+
        '<div class="cb" style="color:'+tc+';background:'+(ST.ed===i?'rgba(255,255,255,.25)':bg2)+';border:1.5px solid '+(ST.ed===i?'rgba(255,255,255,.65)':bc)+';" onclick="openEd('+i+')">'+ICO.edit+'</div>'+
      '</div>'+
      '<div class="shex" style="color:'+tc+';" onclick="cpSwHex(\''+hex+'\')">'+hex.slice(1).toUpperCase()+'</div>';
    sw.addEventListener('dragstart',e=>{dragSrc=i;e.dataTransfer.effectAllowed='move';setTimeout(()=>sw.style.opacity='.25',0);});
    sw.addEventListener('dragend',()=>{sw.style.opacity='1';dragSrc=null;});
    sw.addEventListener('dragover',e=>e.preventDefault());
    sw.addEventListener('drop',e=>{
      e.preventDefault();
      if(dragSrc!==null&&dragSrc!==i){const m=ST.cols.splice(dragSrc,1)[0];ST.cols.splice(i,0,m);dragSrc=null;render();if(ST.ed!==null)fillEd(ST.ed);refreshLive();}
    });
    pal.appendChild(sw);
    if(i<ST.cols.length-1){
      const rh=document.createElement('div');rh.className='rh';rh.dataset.i=i;
      rh.addEventListener('mousedown',onRhDown);
      rh.addEventListener('dblclick',e=>{e.preventDefault();equalFlex();});
      pal.appendChild(rh);
    }
  });
}
function tLock(i){ST.cols[i].locked=!ST.cols[i].locked;render();}
function patchSw(i,hex){
  const sws=document.querySelectorAll('.sw');if(!sws[i])return;
  sws[i].style.background=hex;
  const L=lum(hex),tc=L>.4?'rgba(0,0,0,.72)':'rgba(255,255,255,.9)';
  sws[i].querySelectorAll('.cb').forEach(b=>b.style.color=tc);
  const s=sws[i].querySelector('.shex');if(s){s.textContent=hex.slice(1).toUpperCase();s.style.color=tc;}
}

// Resize handles
let rhd=null;
function onRhDown(e){
  e.preventDefault();
  const idx=parseInt(e.currentTarget.dataset.i);
  rhd={idx,x0:e.clientX,fl:ST.cols[idx].flex,fr:ST.cols[idx+1].flex};
  e.currentTarget.classList.add('dragging');
  document.addEventListener('mousemove',onRhMove);
  document.addEventListener('mouseup',onRhUp);
}
function onRhMove(e){
  if(!rhd)return;
  const W=document.getElementById('pal').getBoundingClientRect().width;
  const totF=ST.cols.reduce((s,c)=>s+c.flex,0);
  const df=(e.clientX-rhd.x0)/W*totF;
  ST.cols[rhd.idx].flex=Math.max(.2,rhd.fl+df);
  ST.cols[rhd.idx+1].flex=Math.max(.2,rhd.fr-df);
  const sws=document.querySelectorAll('.sw');
  if(sws[rhd.idx])sws[rhd.idx].style.flex=ST.cols[rhd.idx].flex;
  if(sws[rhd.idx+1])sws[rhd.idx+1].style.flex=ST.cols[rhd.idx+1].flex;
}
function onRhUp(){
  document.querySelectorAll('.rh.dragging').forEach(r=>r.classList.remove('dragging'));
  rhd=null;document.removeEventListener('mousemove',onRhMove);document.removeEventListener('mouseup',onRhUp);
}
function equalFlex(){ST.cols.forEach(c=>c.flex=1);render();}

// Triangle + hue ring picker — triangle is FIXED, never rotates
const CS=232,CX=116,CY=116,OR=110,IR=90,TR=82;
const cnv=document.getElementById('cpick');
const c2d=cnv.getContext('2d');
let pk={h:200,s:.72,v:.8,drag:null};
// Fixed triangle: top vertex = hue, bottom-right = white, bottom-left = black
const FTA=[CX,CY-TR];
const FTB=[CX+TR*Math.cos(PI/6), CY+TR*Math.sin(PI/6)];
const FTC=[CX-TR*Math.cos(PI/6), CY+TR*Math.sin(PI/6)];

function drawPicker(){
  c2d.clearRect(0,0,CS,CS);
  // Hue ring
  for(let i=0;i<360;i++){
    const a1=i/360*TAU-PI/2,a2=(i+1)/360*TAU-PI/2;
    c2d.beginPath();c2d.arc(CX,CY,OR,a1,a2);c2d.arc(CX,CY,IR,a2,a1,true);c2d.closePath();
    c2d.fillStyle='hsl('+i+',100%,50%)';c2d.fill();
  }
  // Triangle — clipped, never rotates
  c2d.save();
  c2d.beginPath();c2d.moveTo(FTA[0],FTA[1]);c2d.lineTo(FTB[0],FTB[1]);c2d.lineTo(FTC[0],FTC[1]);c2d.closePath();c2d.clip();
  // Base hue color
  c2d.fillStyle='hsl('+pk.h+',100%,50%)';c2d.fillRect(0,0,CS,CS);
  // White gradient from FTB (right) toward FTA-FTC edge midpoint
  const mAC=[(FTA[0]+FTC[0])/2,(FTA[1]+FTC[1])/2];
  const gW=c2d.createLinearGradient(FTB[0],FTB[1],mAC[0],mAC[1]);
  gW.addColorStop(0,'rgba(255,255,255,1)');gW.addColorStop(1,'rgba(255,255,255,0)');
  c2d.fillStyle=gW;c2d.fillRect(0,0,CS,CS);
  // Black gradient from FTC (left) toward FTA-FTB edge midpoint
  const mAB=[(FTA[0]+FTB[0])/2,(FTA[1]+FTB[1])/2];
  const gBk=c2d.createLinearGradient(FTC[0],FTC[1],mAB[0],mAB[1]);
  gBk.addColorStop(0,'rgba(0,0,0,1)');gBk.addColorStop(1,'rgba(0,0,0,0)');
  c2d.fillStyle=gBk;c2d.fillRect(0,0,CS,CS);
  c2d.restore();
  // Hue ring dot (rotates with pk.h)
  const wa=pk.h*PI/180-PI/2,wr=(OR+IR)/2,wx=CX+wr*Math.cos(wa),wy=CY+wr*Math.sin(wa);
  c2d.beginPath();c2d.arc(wx,wy,7,0,TAU);c2d.strokeStyle='white';c2d.lineWidth=2.5;c2d.stroke();
  c2d.strokeStyle='rgba(0,0,0,.3)';c2d.lineWidth=1;c2d.stroke();
  // SV dot inside triangle (moves within fixed triangle)
  const tp=sv2pos();
  c2d.beginPath();c2d.arc(tp[0],tp[1],6,0,TAU);c2d.strokeStyle='white';c2d.lineWidth=2.5;c2d.stroke();
  c2d.strokeStyle='rgba(0,0,0,.3)';c2d.lineWidth=1;c2d.stroke();
}

function sv2pos(){
  const a=pk.s*pk.v,b=(1-pk.s)*pk.v,cv=1-pk.v;
  return[a*FTA[0]+b*FTB[0]+cv*FTC[0],a*FTA[1]+b*FTB[1]+cv*FTC[1]];
}
function pos2sv(px,py){
  const[ax,ay]=FTA,[bx,by]=FTB,[cx,cy]=FTC;
  const den=(by-cy)*(ax-cx)+(cx-bx)*(ay-cy);
  if(Math.abs(den)<.001)return null;
  let wa=((by-cy)*(px-cx)+(cx-bx)*(py-cy))/den;
  let wb=((cy-ay)*(px-cx)+(ax-cx)*(py-cy))/den;
  let wc=1-wa-wb;
  wa=Math.max(0,wa);wb=Math.max(0,wb);wc=Math.max(0,wc);
  const t=wa+wb+wc;wa/=t;wb/=t;
  const v=wa+wb,s=v>.001?wa/v:0;
  return{s:Math.min(1,Math.max(0,s)),v:Math.min(1,Math.max(0,v))};
}
function getXY(e){
  const r=cnv.getBoundingClientRect(),sc=CS/r.width;
  const src=e.touches?e.touches[0]:e;
  return[(src.clientX-r.left)*sc,(src.clientY-r.top)*sc];
}
function pickDown(e){
  e.preventDefault();
  const[px,py]=getXY(e),dx=px-CX,dy=py-CY,d=Math.sqrt(dx*dx+dy*dy);
  pk.drag=d>=IR-3&&d<=OR+5?'wheel':'tri';pickMove(e);
}
function pickMove(e){
  if(!pk.drag)return;e.preventDefault();
  const[px,py]=getXY(e),dx=px-CX,dy=py-CY;
  if(pk.drag==='wheel')pk.h=((Math.atan2(dy,dx)+PI/2)*180/PI+360)%360;
  else{const sv=pos2sv(px,py);if(sv){pk.s=sv.s;pk.v=sv.v;}}
  drawPicker();syncEd();
}
cnv.addEventListener('mousedown',pickDown);cnv.addEventListener('mousemove',pickMove);
cnv.addEventListener('mouseup',()=>pk.drag=null);cnv.addEventListener('mouseleave',()=>pk.drag=null);
cnv.addEventListener('touchstart',pickDown,{passive:false});cnv.addEventListener('touchmove',pickMove,{passive:false});
cnv.addEventListener('touchend',()=>pk.drag=null);

function syncEd(){
  if(ST.ed===null)return;
  ST.cols[ST.ed]={...ST.cols[ST.ed],h:pk.h,s:pk.s,v:pk.v};
  const hex=gHex(ST.ed);
  document.getElementById('hi').value=hex.slice(1).toUpperCase();
  document.getElementById('cprev').style.background=hex;
  patchSw(ST.ed,hex);refreshLive();
}
function openEd(i){
  if(ST.ed===i){ST.ed=null;document.querySelectorAll('.sw').forEach(s=>s.classList.remove('act'));return;}
  ST.ed=i;document.querySelectorAll('.sw').forEach((s,j)=>s.classList.toggle('act',j===i));
  fillEd(i);setTab('e');
}
function fillEd(i){
  const c=ST.cols[i];pk.h=c.h;pk.s=c.s;pk.v=c.v;drawPicker();
  const hex=gHex(i);
  document.getElementById('hi').value=hex.slice(1).toUpperCase();
  document.getElementById('cprev').style.background=hex;
}
function onHi(){
  const v=document.getElementById('hi').value.replace(/[^0-9a-fA-F]/g,'');if(v.length!==6)return;
  const hsv=hex2hsv('#'+v);pk.h=hsv.h;pk.s=hsv.s;pk.v=hsv.v;drawPicker();
  document.getElementById('cprev').style.background='#'+v;
  if(ST.ed!==null){ST.cols[ST.ed]={...ST.cols[ST.ed],...hsv};patchSw(ST.ed,'#'+v);refreshLive();}
}

// Tabs
function setTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  ['e','p','x'].forEach(id=>document.getElementById(id+'t').classList.toggle('on',id===t));
  if(t==='p')renderPrev(ST.prevTab);if(t==='x')updateXCode();
}
function setPrev(t,btn){
  ST.prevTab=t;
  document.querySelectorAll('.pst').forEach(b=>b.classList.toggle('on',b===btn));
  renderPrev(t);
}
function refreshLive(){
  if(document.getElementById('pt').classList.contains('on'))renderPrev(ST.prevTab);
  if(document.getElementById('xt').classList.contains('on'))updateXCode();
}

// Role mapping: darkest, lightest, most vibrant, accent
function getRoles(){
  const data=gAll().map(h=>{const{s,v}=hex2hsv(h);return{hex:h,L:lum(h),vib:s*v};}).sort((a,b)=>a.L-b.L);
  const n=data.length;
  const byV=[...data].sort((a,b)=>b.vib-a.vib);
  return{
    dark:data[0].hex,
    light:data[n-1].hex,
    mid:data[Math.round((n-1)/2)].hex,
    surf:n>2?data[n-2].hex:data[n-1].hex,
    pri:byV[0].hex,
    acc:byV[Math.min(1,n-1)].hex,
    all:data.map(d=>d.hex),
  };
}

}

function prevPattern(R){
  const hexes=gAll(),n=hexes.length;
  const W=700,H=190,r=14,colW=r*2+3,rowH=r*Math.sqrt(3);
  let svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:auto;">';
  let row=0;
  for(let y=-r;y<H+r;y+=rowH,row++){
    let col=0;
    for(let x=-r+(row%2===1?colW/2:0);x<W+r;x+=colW,col++){
      const clr=hexes[(row*7+col*3)%n];
      const pts=[];
      for(let a=0;a<6;a++){const ang=(a*60-30)*PI/180;pts.push((x+r*Math.cos(ang)).toFixed(1)+','+(y+r*Math.sin(ang)).toFixed(1));}
      svg+='<polygon points="'+pts.join(' ')+'" fill="'+clr+'" stroke="rgba(0,0,0,.04)" stroke-width=".5"/>';
    }
  }
  svg+='</svg>';
  return '<div style="overflow:hidden;border-radius:0;">'+svg+'</div>';
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&e.target.tagName!=='INPUT'&&e.target.tagName!=='SELECT'){e.preventDefault();gen();return;}
  if(ST.ed===null||e.target.tagName==='INPUT')return;
  const c=ST.cols[ST.ed],big=e.shiftKey;
  if(e.code==='ArrowLeft'){e.preventDefault();c.h=(c.h-(big?10:1)+360)%360;pk.h=c.h;drawPicker();syncEd();}
  else if(e.code==='ArrowRight'){e.preventDefault();c.h=(c.h+(big?10:1))%360;pk.h=c.h;drawPicker();syncEd();}
  else if(e.code==='ArrowUp'){e.preventDefault();c.v=Math.min(1,c.v+(big?.1:.015));pk.v=c.v;drawPicker();syncEd();}
  else if(e.code==='ArrowDown'){e.preventDefault();c.v=Math.max(0,c.v-(big?.1:.015));pk.v=c.v;drawPicker();syncEd();}
});
